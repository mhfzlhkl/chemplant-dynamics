<title>ChemPlant Dynamics</title>
<style>

/* ===== app.css ===== */
/* ui_root/static/css/app.css */



/* ===== app_skeleton.css ===== */
/* app_skeleton.css
 *
 * Shimmer-animated placeholder blocks used by ``app.ui.loading``.
 *
 * Pattern: a horizontal gradient that travels left → right at a
 * steady rate. Lighter weight than opacity-pulse animations
 * (which fight with the browser's compositor on mobile) and more
 * "alive" than a solid block.
 *
 * The base color is themed via ``--skeleton-base-color`` so the
 * skeleton blends with whatever background the host page uses.
 * The accent (highlight) is themed via ``--skeleton-accent-color``.
 *
 * Variants:
 *   .app-skeleton              — generic block (default 100% × 1em)
 *   .app-skeleton-row          — full-width single line
 *   .app-skeleton-card         — multi-row card with 2-3 stacked lines
 *   .app-skeleton-circle       — square-aspect, fully rounded (avatars)
 *
 * All variants carry the same animation timing so a screen full of
 * skeletons pulses in unison — easier on the eye than scattered
 * timing offsets.
 */

:root {
    --skeleton-base-color: rgba(255, 255, 255, 0.06);
    --skeleton-accent-color: rgba(255, 213, 79, 0.18);
    --skeleton-duration: 1.6s;
    --skeleton-radius: 6px;
}

@keyframes app-skeleton-shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position:  200% 0; }
}

.app-skeleton {
    display: block;
    position: relative;
    background-color: var(--skeleton-base-color);
    background-image: linear-gradient(
        90deg,
        var(--skeleton-base-color) 0%,
        var(--skeleton-accent-color) 50%,
        var(--skeleton-base-color) 100%
    );
    background-size: 200% 100%;
    background-repeat: no-repeat;
    animation: app-skeleton-shimmer var(--skeleton-duration)
        linear infinite;
    border-radius: var(--skeleton-radius);
    min-height: 1em;
    /* Skeletons should never receive pointer events; they are
     * placeholders, not interactive surfaces. */
    pointer-events: none;
    user-select: none;
}

.app-skeleton-row {
    height: 0.9em;
    width: 100%;
}

.app-skeleton-card {
    /* A "card" skeleton is 3 stacked rows with consistent spacing.
     * Built with a child element so the height matches the parent
     * container exactly. */
    width: 100%;
    min-height: 6em;
    padding: 0.75em;
    display: flex;
    flex-direction: column;
    gap: 0.5em;
    box-sizing: border-box;
    border: 1px solid var(--skeleton-base-color);
    border-radius: var(--skeleton-radius);
}

.app-skeleton-card .app-skeleton-row {
    width: 100%;
}

.app-skeleton-card .app-skeleton-row:nth-child(2) {
    width: 80%;
}

.app-skeleton-card .app-skeleton-row:nth-child(3) {
    width: 60%;
}

.app-skeleton-circle {
    aspect-ratio: 1 / 1;
    border-radius: 50%;
}

/* When the skeleton is being replaced by real content we fade it
 * out so the swap is smooth. The host calls
 * ``replace_with_real(skeleton_el)`` which adds ``.app-skeleton-leaving``
 * for the duration of the fade (160 ms), then removes the element
 * entirely. */
.app-skeleton.app-skeleton-leaving {
    opacity: 0;
    transition: opacity 160ms ease-out;
}

/* =========================================================
   SPINNER OVERLAY
   ========================================================= */

.app-spinner-overlay {
    position: absolute;
    inset: 0;
    z-index: 10;

    display: flex !important;
    align-items: center;
    justify-content: center;

    /* Light tint so the panel bg still shows through. */
    background-color: rgba(17, 23, 34, 0.35);

    /* Content behind is blurred while loading. */
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);

    /* Pointer events pass through so the user can still scroll /
       interact with the blurred content behind the spinner. The
       spinner itself is a decorative visual cue, not a modal
       blocker. */
    pointer-events: none;
}

.app-spinner-center {
    display: flex !important;
    align-items: center;
    justify-content: center;

    margin: 0 !important;
    padding: 0 !important;

    /* The center cluster catches pointer events so nothing
       behind it accidentally receives clicks through the spinner. */
    pointer-events: auto;
}

/* =========================================================
   GRADIENT SPINNER (pure CSS)
   A rotating ring with a conic gradient that cycles through
   amber → gold → white → amber. Replaces the solid-colour
   Quasar spinner so the loading cue reads as "system" not
   "generic".
   ========================================================= */

.app-spinner-gradient {
    width: 2.5em;
    height: 2.5em;
    border-radius: 50%;

    background: conic-gradient(
        from 0deg,
        var(--text-highlight, #ffd54f) 0%,
        #ffffff 25%,
        var(--text-highlight, #ffd54f) 50%,
        rgba(255, 213, 79, 0.25) 75%,
        var(--text-highlight, #ffd54f) 100%
    );

    /* Hollow centre — creates the ring look. */
    -webkit-mask: radial-gradient(
        circle,
        transparent 55%,
        black 56%
    );
    mask: radial-gradient(
        circle,
        transparent 55%,
        black 56%
    );

    animation: app-spinner-rotate 1.1s linear infinite;
}

@keyframes app-spinner-rotate {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}


/* ===== base.css ===== */
/* ui_root/static/css/base.css */

@layer base {
    /* =========================================================
       BASE PAGE
       ========================================================= */

    html,
    body {
        min-width: var(--min-viewport-width);
        background-color: var(--bg-main);
        font-family: var(--font-ui);
        margin: 0;
        padding: 0;
    }

    /* NiceGUI root/body helper */
    .app-body {
        min-width: var(--min-viewport-width);
        background-color: var(--bg-main);
        color: var(--text-main);
        font-family: var(--font-ui);
    }

    /* Main content placeholder */
    .main-content {
        background-color: var(--bg-main);
        color: var(--text-main);
    }
}


/* ===== button_feedback.css ===== */
/* button_feedback.css
 *
 * Pure-CSS pressed/active state for buttons that want sub-16 ms
 * visual feedback without a server round-trip.
 *
 * The pattern is a CSS class swap driven by the browser's
 * ``:active`` pseudo-class combined with a
 * ``pointerdown``/``pointerup`` event listener installed on the
 * element by ``app.ui.button_feedback.attach_pointer_feedback``.
 *
 * Why both ``:active`` and the explicit class?
 *
 *   * ``:active`` covers keyboard focus + Enter/Space
 *     automatically (matches the existing :focus-visible style).
 *   * The explicit class lets us also light up on *touchstart*
 *     for the same device-class that the iOS Safari team
 *     removed ``:hover`` from.
 *
 * The visual treatment is intentionally subtle: a 1-px inset glow
 * and a 1-step background tint. Anything more is visible on
 * 60 fps recordings and becomes annoying when buttons are
 * rapidly tapped.
 *
 * Each variant overrides the colors so a button on a dark panel
 * (e.g. ``.pid-navbar-run-btn``) and a button on a light panel
 * (``drawer-menu-item``) both read as pressed.
 */

.btn-feedback {
    transition:
        background-color 80ms linear,
        box-shadow 80ms linear,
        transform 80ms ease-out;
    will-change: background-color, box-shadow, transform;
}

/* The browser fires ``:active`` while the pointer button is
 * held. Use it for the keyboard case. The explicit class added
 * by JS (added in pointerdown, removed on pointerup/pointercancel)
 * covers the touch case where :active is not always reliable. */
.btn-feedback:active,
.btn-feedback.is-pressed {
    transform: translateY(1px);
    box-shadow:
        inset 0 0 0 1px var(--btn-feedback-glow, rgba(255, 213, 79, 0.45)),
        inset 0 1px 0 0 rgba(0, 0, 0, 0.20);
}

/* On dark surfaces (navbar / drawer on control panel) */
.btn-feedback--dark {
    --btn-feedback-glow: rgba(255, 213, 79, 0.55);
    --btn-feedback-tint:  rgba(255, 213, 79, 0.10);
}

.btn-feedback--dark.is-pressed,
.btn-feedback--dark:active {
    background-color: var(--btn-feedback-tint);
}

/* On light surfaces (home page, expansion cards) */
.btn-feedback--light {
    --btn-feedback-glow: rgba(38, 198, 218, 0.55);
    --btn-feedback-tint:  rgba(38, 198, 218, 0.10);
}

.btn-feedback--light.is-pressed,
.btn-feedback--light:active {
    background-color: var(--btn-feedback-tint);
}

/* The "active" / "selected" state stays on a button that has been
 * toggled, e.g. the left-drawer item that owns the current section.
 * A subtle persistent accent — not the same as the pressed
 * feedback, which is transient. */
.btn-feedback--persistent-active {
    box-shadow:
        inset 2px 0 0 0 var(--btn-feedback-glow, rgba(255, 213, 79, 0.65));
}


/* ===== control_panel/base.css ===== */
/* ui_root/static/css/control_panel/base.css */

@layer pages {

    /* =========================================================
       BOX MODEL RESET INSIDE CONTROL PANEL
       ========================================================= */

    body.control-panel-page *,
    body.control-panel-page *::before,
    body.control-panel-page *::after {
        box-sizing: border-box;
    }


    /* =========================================================
       PAGE ROOT RESET
       ========================================================= */

    body.control-panel-page,
    body.control-panel-page #app,
    body.control-panel-page .nicegui-content,
    body.control-panel-page .q-layout,
    body.control-panel-page .q-page-container,
    body.control-panel-page .q-page {
        width: 100% !important;
        max-width: none !important;
        min-width: var(--min-viewport-width);

        height: 100% !important;
        min-height: 100% !important;

        margin: 0 !important;
        padding: 0 !important;

        background-color: var(--bg-main) !important;

        overflow: hidden !important;
    }

    body.control-panel-page .nicegui-content {
        gap: 0 !important;
        margin: 0 !important;
        padding: 0 !important;
    }


    /* =========================================================
       MAIN AREA

       Fixed exactly between header and footer.
       Left offset follows drawer state.
       ========================================================= */

    .control-panel-main {
        position: fixed;

        top: var(--header-h);
        right: 0;
        bottom: var(--footer-h);
        left: 0;

        width: auto !important;
        max-width: none !important;
        min-width: 0;

        height: auto !important;
        min-height: 0 !important;

        display: flex !important;
        flex-direction: column;

        gap: 0 !important;

        margin: 0 !important;
        padding: 0 !important;

        background-color: var(--bg-main);
        color: var(--text-main);

        font-family: var(--font-control-ui);

        overflow: hidden !important;

        transition: left 0.18s ease;
    }

    .control-panel-main > * {
        margin: 0 !important;
        padding: 0 !important;
    }

    body.control-panel-page.control-panel-drawer-closed .control-panel-main {
        left: 0;
    }

    body.control-panel-page.control-panel-drawer-open .control-panel-main {
        left: var(--control-left-drawer-w, 200px);
    }


    /* =========================================================
       CONTENT STACK
       ========================================================= */

    .control-panel-content-stack {
        width: 100%;
        height: 100%;
        min-height: 0;

        display: flex !important;
        flex-direction: column;

        gap: 0 !important;

        margin: 0 !important;
        padding: 0 !important;

        background-color: var(--bg-main);

        font-family: var(--font-control-ui);

        overflow: hidden !important;
    }

    .control-panel-content-stack > * {
        margin: 0 !important;
        padding: 0 !important;
    }
}

/* ===== control_panel/controller_modal.css ===== */
/* ui/static/css/control_panel/controller_modal.css */

/* =========================================================
   CONTROLLER MODAL — DCS HMI faceplate style

   The controller modal is the *transient* variant of the
   right-drawer faceplate. It uses the EXACT same visual
   language — same gradient, same border, same section card,
   same input chrome, same action buttons — so the operator
   sees one consistent widget family whether the controller
   is open in the drawer (persistent) or as a modal
   (transient overlay).

   Design tokens shared with faceplate.css:

   - Card body: radial amber wash (top-left) + radial white
     wash (top-right) + linear slate→near-black gradient.
   - Hair border: 1px solid rgba(255, 255, 255, 0.85).
   - 8 px radius.
   - Header strip: amber-on-translucent gradient, content-sized
     (no fixed min-height so the modal header matches the
     right-drawer faceplate's natural height exactly).
   - Section card: rgba(17, 17, 17, 0.82) bg, 1 px hair border
     rgba(255, 255, 255, 0.14), 6 px radius, 6/8 padding.
   - Section title: uppercase 0.66 rem amber, --font-control-ui.
   - Input row: 24 px tall, rgba(27, 27, 27, 0.94) bg, 4 px
     radius, 42 px label / 1 fr input / 78 px unit grid.
   - Action button: 26 px tall, amber outline, transparent fill,
     amber hover wash.

   The modal drops the bargraphs (those live in the right-drawer
   faceplate) and the mode-status dot (Mode select renders
   status inline).
   ========================================================= */

@layer pages {
    /* ── Manual-anchor placement note ──
       The controller modal is pinned to a hard-coded viewport
       corner per tag (see ``MANUAL_ANCHORS`` in
       ``app/pid/sthr/controller_modal.py``). The override is
       applied as INLINE STYLES on the card itself via
       ``setProperty(name, value, 'important')`` from JS because
       layered CSS (this file is inside ``@layer pages``) always
       loses the cascade to Quasar's unlayered utility classes
       AND to NiceGUI's own inline ``position: fixed; left: …;
       top: …`` written onto the card to center it. Do NOT add
       ``.tic-param-dialog-card { position: fixed; ... }``
       overrides here — they would silently lose to the inline
       styles set by both NiceGUI and the placement JS. */

    /* ── Card chrome — mirrors .pid-right-drawer (flat body,
       gradient lives on the header only, same as the faceplate
       right drawer). The faceplate deliberately keeps the body
       flat --bg-panel so the only color signal is the header's
       amber wash and the section-card backgrounds. */
    .tic-param-dialog-card {
        position: relative;

        width: 300px;
        max-width: min(96vw, 300px);

        padding: 0 !important;

        background-color: var(--bg-panel, #111722) !important;
        color: #ffffff !important;
        font-family: var(--font-control-ui) !important;

        border: 1px solid var(--border-color, #2a3441) !important;
        border-radius: 8px !important;

        box-shadow:
            0 18px 42px rgba(0, 0, 0, 0.45),
            0 0 0 1px rgba(255, 255, 255, 0.025) !important;
        overflow: hidden;
        gap: 0 !important;
    }

    /* ── Header strip — mirrors .faceplate-header exactly
       (same gradient, same border, same padding, same gap,
       same flex layout). The modal header has three clusters:
       - Left: tag (mono amber) + title (small uppercase muted)
         stacked in a column (.faceplate-header-text).
       - Middle: mode badge with status dot + AUTO/MANUAL text
         (.faceplate-mode-badge).
       - Right: close button (.faceplate-close-btn).
       The faceplate has a 4th "Mode select" there in the
       drawer; in the modal the body already has a Mode
       select, so we replace the right cluster with a close
       button instead. */
    .tic-param-dialog-header {
        /* Mirrors .faceplate-header exactly — same width,
           gradient, border, padding, gap, flex layout. The
           modal deliberately does NOT set ``min-height`` /
           ``max-width`` / ``box-sizing`` so the header sizes
           itself from its content + padding, exactly like the
           right-drawer faceplate. Forcing a 34px min-height
           was previously making the modal header visibly taller
           than the faceplate's, breaking the visual continuity
           between the two surfaces. */
        width: 100%;

        display: flex !important;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;

        gap: 0.4rem;
        margin: 0 !important;
        padding: 0.4rem 0.5rem !important;

        background:
            linear-gradient(180deg, rgba(255, 214, 0, 0.08), rgba(255, 214, 0, 0.0)),
            rgba(255, 255, 255, 0.025) !important;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 6px;

        /* Single-line header — never wrap to a second line
           regardless of modal width. The right cluster (mode
           badge + close button) keeps its full size; the left
           cluster (tag + title) truncates to make room. */
        flex-wrap: nowrap !important;
        min-width: 0;
    }

    /* Left cluster (tag + title stacked) — mirrors
       .faceplate-header-text exactly. Allowed to shrink and
       ellipsis its children when the right cluster (mode
       badge + close button) needs the remaining space.

       The ``min-width: var(--faceplate-input-w, 60px)`` line
       ties the truncation threshold to the longest input
       value (set from Python in
       ``FaceplatePanel._apply_drawer_size``). The cluster
       can shrink down to the input's own width before the
       title starts clipping — so the header column always
       matches the input column visually, identical to the
       right-drawer faceplate.

       ``ui.column`` already provides ``display: flex;
       flex-direction: column;`` so the modal does not need
       to re-declare them here (the previous version did,
       which produced a subtly different flex behaviour
       than the faceplate's ``ui.column``). */
    .tic-param-dialog-header-text {
        min-width: var(--faceplate-input-w, 60px);
        flex: 1 1 auto;
        overflow: hidden;
    }

    .tic-param-dialog-header-text {
        gap: 0.05rem;
        margin: 0 !important;
        padding: 0 !important;
    }

    /* Force the inner labels to ellipsis instead of pushing
       the close button off-screen — same contract as
       .faceplate-header-text .faceplate-title / .faceplate-tag. */
    .tic-param-dialog-header-text .tic-param-dialog-tag,
    .tic-param-dialog-header-text .tic-param-dialog-title {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
    }

    /* Right cluster — mirrors .faceplate-header-right. Holds
       the mode badge + close button in a single inline-flex
       row, so the outer .tic-param-dialog-header only has to
       space-between two children. */
    .tic-param-dialog-header-right {
        display: flex !important;
        flex-direction: row;
        align-items: center;
        gap: 0.35rem;

        flex: 0 0 auto;
        flex-shrink: 0;
        white-space: nowrap;
        margin: 0 !important;
        padding: 0 !important;
    }

    /* Tag (top line) — mirrors .faceplate-tag. Mono amber
       0.95rem, same as the right-drawer faceplate's tag. */
    .tic-param-dialog-tag {
        color: var(--text-highlight, #ffd600);

        font-family: var(--font-mono, "Courier Prime", monospace);
        font-size: 0.95rem;
        font-weight: 700;
        line-height: 1;
        letter-spacing: 0.06em;

        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
    }

    /* Title (subtext) — mirrors .faceplate-title. Small
       uppercase muted Courier. */
    .tic-param-dialog-title {
        color: var(--text-muted, #bdbdbd);

        font-family: var(--font-control-ui);
        font-size: 0.62rem;
        font-weight: 600;
        line-height: 1;
        text-transform: uppercase;
        letter-spacing: 0.04em;

        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
    }

    /* Mode badge (middle cluster) — mirrors .faceplate-mode-badge.
       Dark glass background, status dot + AUTO/MANUAL/OFF text. */
    .tic-param-mode-badge {
        display: flex !important;
        flex-direction: row;
        align-items: center;
        gap: 0.32rem;

        padding: 0.18rem 0.45rem !important;
        margin: 0 !important;

        background-color: rgba(0, 0, 0, 0.32) !important;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 4px;

        flex: 0 0 auto;
        white-space: nowrap;
    }

    .tic-param-status-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex: 0 0 auto;
        vertical-align: middle;
    }

    .tic-param-status-auto {
        background: #4caf50 !important;
        box-shadow: 0 0 6px rgba(76, 175, 80, 0.55) !important;
    }

    .tic-param-status-manual {
        background: #ffb300 !important;
        box-shadow: 0 0 6px rgba(255, 179, 0, 0.55) !important;
    }

    .tic-param-status-off {
        background: #9e9e9e !important;
        box-shadow: 0 0 6px rgba(158, 158, 158, 0.45) !important;
    }

    .tic-param-mode-text {
        color: var(--text-white, #ffffff);

        font-family: var(--font-mono, "Courier Prime", monospace);
        font-size: 0.65rem;
        font-weight: 700;
        line-height: 1;
        letter-spacing: 0.06em;
    }

    /* Close button (right cluster) — mirrors .faceplate-close-btn.
       Top-right corner, transparent fill, red on hover. Use
       the Quasar round sm button (32 px diameter) so the
       button size stays predictable. */
    .tic-param-close-btn {
        flex: 0 0 auto !important;
        align-self: center !important;

        color: #ffffff !important;
        background: transparent !important;

        box-shadow: none !important;
    }

    .tic-param-close-btn .q-btn__content {
        color: #ffffff !important;
    }

    .tic-param-close-btn:hover {
        background-color: rgba(198, 40, 40, 0.55) !important;
    }

    /* Body — same vertical rhythm as the faceplate body. */
    .tic-param-dialog-content {
        width: 100%;
        padding: 6px 6px 4px 6px;

        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 6px;

        background: transparent;
    }

    /* ── Section card — mirrors .faceplate-section exactly
       (flat rgba(0,0,0,0.18) bg, hair border, 5px radius). */
    .tic-param-section {
        width: 100%;
        display: flex !important;
        flex-direction: column !important;

        background-color: rgba(0, 0, 0, 0.18) !important;
        border: 1px solid rgba(255, 255, 255, 0.06) !important;
        border-radius: 5px !important;

        padding: 6px 8px !important;
        gap: 4px !important;

        box-shadow: none !important;
    }

    .tic-param-section-title {
        color: var(--text-highlight, #ffd54f) !important;
        font-family: var(--font-control-ui);
        font-size: 0.66rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        line-height: 1;
        margin: 0 0 4px 0 !important;
    }

    .tic-param-inputs {
        width: 100%;

        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    /* ── Input row — mirrors .faceplate-input-row ──
       42 px label, 1 fr input, 78 px unit chip. */
    .tic-param-row {
        width: 100%;
        min-height: 24px;

        display: grid;
        grid-template-columns: 42px minmax(0, 1fr) 78px;

        align-items: center;
        column-gap: 6px;
    }

    .tic-param-row > * {
        min-width: 0;
    }

    .tic-param-variable {
        color: #ffffff;
        font-family: var(--font-control-ui);
        font-size: 0.7rem;
        font-weight: 700;
        line-height: 1;
        white-space: nowrap;
    }

    .tic-param-unit {
        color: var(--text-muted, #bdbdbd);
        font-family: var(--font-control-ui);
        font-size: 0.6rem;
        line-height: 1.2;
        text-align: left;
        white-space: nowrap;

        overflow: hidden;
        text-overflow: ellipsis;
    }

    .tic-param-value,
    .tic-param-mode {
        width: 100%;
    }

    /* Input chrome — 24 px tall, dark, 4 px radius, no border. */
    .tic-param-value .q-field__control,
    .tic-param-mode .q-field__control {
           height: 24px !important;
           min-height: 24px !important;

        background-color: rgba(27, 27, 27, 0.94) !important;
        border: 0 !important;
        border-radius: 4px !important;

           padding: 0 4px !important;
        box-shadow: none !important;
    }

    .tic-param-value .q-field__native,
    .tic-param-value .q-field__input,
    .tic-param-mode .q-field__native,
    .tic-param-mode .q-field__input,
    .tic-param-mode .q-field__control-container {
           height: 24px !important;
           min-height: 24px !important;
           line-height: 24px !important;

        padding: 0 !important;

        color: #ffffff !important;
        font-family: var(--font-control-ui) !important;
           font-size: 0.7rem !important;
        text-align: center !important;
    }

    .tic-param-value input,
    .tic-param-mode input {
        color: #ffffff !important;
        font-family: var(--font-control-ui) !important;
            font-size: 0.7rem !important;
        text-align: center !important;
    }

    .tic-param-value .q-field__append,
    .tic-param-mode .q-field__append {
           height: 24px !important;
           min-height: 24px !important;
        color: #ffffff !important;
        padding-left: 2px !important;
    }

    .tic-param-value .q-field__bottom,
    .tic-param-mode .q-field__bottom {
        display: none !important;
    }

    /* Readonly input — dim text, lighter bg. */
    .tic-param-readonly-value .q-field__control {
        background-color: rgba(37, 37, 37, 0.92) !important;
    }

    .tic-param-readonly-value .q-field__native,
    .tic-param-readonly-value input {
        color: #9e9e9e !important;
        opacity: 0.7 !important;
        cursor: default !important;
    }

    .tic-param-readonly-value-text {
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;

        width: 100%;
        height: 24px !important;
        min-height: 24px !important;

        padding: 0 4px !important;
        margin: 0 !important;

        background-color: rgba(27, 27, 27, 0.94) !important;
        border-radius: 4px !important;

        color: #ffffff !important;
        font-family: var(--font-control-ui) !important;
        font-size: 0.7rem !important;
        font-weight: 700 !important;
        text-align: center !important;
        white-space: nowrap;
    }

    .tic-param-readonly-description {
        color: #bdbdbd;
        font-family: var(--font-control-ui);
        font-size: 0.62rem;
        line-height: 1.4;
        padding: 2px 0;
    }

    /* ── Mode popup — mirrors .faceplate-mode-popup ── */
    .tic-param-mode-popup {
        /* Lock the dropdown width to the Mode select's own
           width so the Quasar ``q-menu`` portal doesn't
           stretch to fill the parent dialog card (300 px)
           and open as a wide dialog. Sized to fit the longest
           label ``Automatic`` at 0.7rem
           ``var(--font-control-ui)`` plus 8 px padding × 2.
           The companion rules below already cap each item at
           24 px tall, so a 76 px wide × ~76 px tall (3 items)
           menu is the intended shape. */
        width: 76px;
        min-width: 76px;
        max-width: 76px;

        background-color: #1b1b1b !important;
        color: #ffffff !important;

        border: 1px solid #303030 !important;
        border-radius: 4px !important;

        box-shadow: none !important;
    }

    .tic-param-mode-popup .q-item {
           min-height: 24px !important;
           height: 24px !important;

        padding: 0 8px !important;

        color: #ffffff !important;
        font-family: var(--font-control-ui) !important;
           font-size: 0.7rem !important;
    }

    .tic-param-mode-popup .q-item__section {
        padding: 0 !important;
        min-width: 0 !important;
    }

    .tic-param-mode-popup .q-item__label {
        color: #ffffff !important;
        font-family: var(--font-control-ui) !important;
           font-size: 0.7rem !important;
           line-height: 24px !important;
    }

    .tic-param-mode-popup .q-item:hover {
        background-color: #2a2a2a !important;
    }

    .tic-param-mode-popup .q-item--active {
        background-color: #3a3000 !important;
    }

    .tic-param-mode-popup .q-item--active .q-item__label {
        color: #ffd54f !important;
        font-weight: 700;
    }

    /* ── Footer — mirrors the faceplate Apply row ── */
    .tic-param-footer {
        width: 100%;
        min-height: 32px;

        display: flex;
        align-items: center;
        justify-content: space-between;

        padding: 6px 8px 8px 8px;

        background: transparent !important;
        -webkit-backdrop-filter: none;
        backdrop-filter: none;
    }

    /* Apply / Face plate — same as .faceplate-apply-btn */
    .tic-param-faceplate-btn,
    .tic-param-apply-btn {
           height: 26px !important;
           min-height: 26px !important;

           padding: 0 12px !important;
        border-radius: 4px !important;

        font-family: var(--font-control-ui) !important;
           font-size: 0.72rem !important;
           font-weight: 700 !important;

        background: transparent !important;
        color: var(--text-highlight, #ffd54f) !important;
        border: 1px solid rgba(255, 213, 79, 0.90) !important;
        box-shadow: none !important;
        text-transform: none !important;
    }

    .tic-param-faceplate-btn .q-btn__content,
    .tic-param-apply-btn .q-btn__content {
        color: var(--text-highlight, #ffd54f) !important;
    }

    .tic-param-faceplate-btn:hover,
    .tic-param-apply-btn:hover {
        background-color: rgba(255, 213, 79, 0.14) !important;
    }

    @media (max-width: 760px) {
        .tic-param-dialog-card {
            width: min(96vw, 300px);
        }
    }
}


/* ===== control_panel/data_logger.css ===== */
/* ui_root/static/css/control_panel/data_logger.css */

/* =========================================================
   DATA LOGGER SECTION

   Visual language follows the PID right drawer
   (see pid_right_drawer.css):

   - card backgrounds use --bg-panel with a hair border;
   - section titles use the uppercase control-UI font
     (.pid-right-drawer-section-title);
   - the title separator matches .pid-right-drawer-separator;
   - "header row of selects" mimics a table header so each
     scope card reads as: header → log rows.

   Layout (top → bottom):

       DATA LOGGER          [All outputs] [All fields] [Clear log]
       ─────────────────────────────────────────────────────────
       INPUTS    – manipulated values & setpoints
       [columns ▾]
       realtime | step | sim_min | input:FSP | …
       <log>
       STATES    – internal controller / plant states
       [columns ▾]
       <log>
       OUTPUTS   – plant outputs (PV) and measured signals
       [columns ▾]
       <log>
       INFO      – Run/Stop/Reset, mode changes, status
       <info log>
   ========================================================= */

@layer pages {

    /* When the data logger root lives inside a control-panel
       section, tint the section's own background so any tiny
       overflow / scroll-padding band reads as a continuation of
       the gradient instead of a black bar above/below. The
       :has() selector targets only sections that contain the
       data logger, so other sections (PID, monitoring, …) are
       unaffected. */
    .control-panel-section:has(> .data-logger-root) {
        background-color: var(--bg-panel-soft) !important;
    }

    .data-logger-root {
        width: 100%;

        /* Stretch top-to-bottom of the section so the gradient
           covers the full viewport even when the log is short.
           The parent .control-panel-section is a flex column, so
           flex:1 1 auto + min-height:100% guarantees full-bleed
           coverage with no surrounding --bg-main strip showing. */
        flex: 1 1 auto;
        min-height: 100%;

        display: flex !important;
        flex-direction: column;

        /* Looser vertical rhythm between cards so the page reads
           like a stack of separate panels rather than a dense list. */
        gap: 1.25rem !important;

        /* Roomier inner padding so cards no longer hug the section
           edges. Top/bottom > left/right so the header and Info card
           breathe relative to the section chrome. */
        padding: 1.5rem 1.25rem 2rem 1.25rem;

        font-family: var(--font-control-ui);

        color: var(--text-main);

        /* Background is flat — same flat var(--bg-panel-soft)
           tone used by the right-drawer faceplate body and the
           other three surfaces (controller modal, runtime
           manager, performance monitor). The only amber wash on
           the page lives on the scope-card headers (mirrors
           .faceplate-header). That way all four surfaces share
           one chrome strategy: flat body, single accent strip
           on the header. */
        background-color: var(--bg-panel-soft, #151c29);

        /* No outer border / radius / shadow — the gradient is the
           section background itself, not a card on top of it. */
        border: 0;
        border-radius: 0;
        box-shadow: none;
    }

    /* ── Page-level title row (acts as the faceplate header
       for the data logger page) ───────────────────────────── */

    .data-logger-page-title-row {
        width: 100%;

        display: flex !important;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;

        gap: 0.75rem !important;

        margin: 0 0 0.25rem 0 !important;
        padding: 0.4rem 0.6rem !important;

        background:
            linear-gradient(180deg, rgba(255, 214, 0, 0.08), rgba(255, 214, 0, 0.0)),
            rgba(255, 255, 255, 0.025) !important;
        border: 1px solid rgba(255, 255, 255, 0.10);
        border-radius: 5px;
    }

    .data-logger-page-title {
        /* Amber mono — matches the controller modal title, the
           runtime manager title, and the performance monitor
           page title so all four surfaces share the same tag
           language. */
        color: var(--text-highlight, #ffd600);

        font-family: var(--font-mono, "Courier Prime", monospace);
        font-size: 0.95rem;
        font-weight: 700;

        letter-spacing: 0.06em;
        line-height: 1;

        /* Soft glow lifts the title off the dark backdrop
           — same trick the faceplate tag uses. */
        text-shadow: 0 0 12px rgba(255, 214, 0, 0.45);
    }

    .data-logger-page-actions {
        display: flex !important;
        align-items: center;

        gap: 0.35rem !important;
        margin: 0 !important;
    }

    .data-logger-action-btn {
        min-height: 26px !important;
        height: 26px !important;

        padding: 0 12px !important;

        color: var(--text-main) !important;

        font-family: var(--font-control-ui) !important;
        font-size: 0.72rem !important;
        font-weight: 700 !important;

        letter-spacing: 0.04em;

        background-color: rgba(255, 255, 255, 0.035) !important;

        border: 1px solid rgba(255, 255, 255, 0.10) !important;
        border-radius: 4px !important;
    }

    .data-logger-action-btn:hover {
        color: var(--text-highlight, #ffd54f) !important;

        background-color: rgba(255, 214, 0, 0.10) !important;
        border-color: rgba(255, 214, 0, 0.45) !important;
    }

    .data-logger-action-btn-danger:hover {
        color: var(--text-white) !important;

        background-color: rgba(211, 47, 47, 0.20) !important;
        border-color: #d32f2f !important;
    }

    /* ── Save menu / per-scope save button ──────────────── */

    /* Primary "Save" button — uses the same chrome as the
       other action buttons but flags itself with the amber
       accent so it reads as the export action (matches the
       faceplate Apply button family). */
    .data-logger-save-btn {
        color: var(--text-highlight, #ffd54f) !important;
        border-color: rgba(255, 214, 0, 0.45) !important;
    }

    .data-logger-save-btn:hover {
        color: var(--text-highlight, #ffd54f) !important;

        background-color: rgba(255, 214, 0, 0.14) !important;
        border-color: rgba(255, 214, 0, 0.85) !important;
    }

    .data-logger-save-btn .q-icon {
        margin-left: 0.25rem !important;
    }

    /* Compact save icon-button on each scope card header. */
    .data-logger-scope-save-btn {
        color: var(--text-highlight, #ffd54f) !important;

        min-width: 26px !important;
        min-height: 26px !important;

        background-color: rgba(255, 214, 0, 0.08) !important;

        border: 1px solid rgba(255, 214, 0, 0.35) !important;
        border-radius: 4px !important;
    }

    .data-logger-scope-save-btn:hover {
        color: var(--text-white) !important;

        background-color: rgba(255, 214, 0, 0.20) !important;
        border-color: rgba(255, 214, 0, 0.75) !important;
    }

    .data-logger-scope-save-btn .q-icon {
        font-size: 1.1rem !important;
    }

    /* Dropdown menu shown when Save is clicked. */
    .data-logger-save-menu {
        background-color: var(--bg-panel) !important;
        color: var(--text-main) !important;

        border: 1px solid var(--border-color);
        border-radius: 6px;

        font-family: var(--font-control-ui);
        font-size: 0.75rem;

        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.40);
    }

    .data-logger-save-menu .q-item {
        min-height: 30px !important;
        padding: 0.25rem 0.75rem !important;

        color: var(--text-main) !important;

        font-family: var(--font-control-ui) !important;
        font-size: 0.72rem !important;
        letter-spacing: 0.02em;
    }

    .data-logger-save-menu .q-item:hover,
    .data-logger-save-menu .q-item--active {
        background-color: rgba(255, 214, 0, 0.18) !important;
        color: var(--text-highlight, #ffd54f) !important;
    }

    .data-logger-save-menu .q-separator {
        background-color: var(--border-color) !important;
        margin: 0.1rem 0;
    }

    /* Wrap the scope title + hint into a column so the save button
       can sit beside them on the right edge of the card header. */
    .data-logger-scope-title-group {
        display: flex !important;
        flex-direction: column;
        align-items: flex-start;

        gap: 0.1rem !important;

        flex: 1 1 auto;
    }

    /* Re-align the existing scope-card-header to a row that puts
       the save button on the trailing edge. */
    .data-logger-scope-card-header {
        align-items: center !important;
        justify-content: space-between !important;
    }

    /* ── Shared scope card (input / state / output / info) ──*/

    .data-logger-scope-card {
        width: 100%;
        flex: 0 0 auto;

        display: flex !important;
        flex-direction: column;

        /* Wider gap so the header row, header-string preview,
           and log widget read as separate strata. */
        gap: 0.75rem !important;

        margin: 0 !important;
        padding: 1.1rem 1.2rem 1.25rem 1.2rem !important;

        /* Flat dark panel bg — mirrors .pid-right-drawer /
           .faceplate-root. The faceplate deliberately keeps
           the body flat so the only color signal is the
           header's amber wash. The scope card's own header
           bar is what carries the amber accent. */
        background-color: var(--bg-panel, #111722);

        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 6px;

        box-shadow:
            0 12px 28px rgba(0, 0, 0, 0.35),
            inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .data-logger-scope-card-header {
        width: 100%;

        display: flex !important;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;

        gap: 0.75rem !important;

        margin: 0 0 0.15rem 0 !important;
    }

    .data-logger-scope-title {
        color: var(--text-highlight, #ffd54f);

        font-family: var(--font-control-ui);
        font-size: 0.66rem;
        font-weight: 700;

        letter-spacing: 0.06em;
        text-transform: uppercase;
        line-height: 1;
    }

    .data-logger-scope-hint {
        color: var(--text-muted, #bdbdbd);

        font-family: var(--font-control-ui);
        font-size: 0.62rem;
        font-weight: 600;

        letter-spacing: 0.04em;
        text-transform: uppercase;
        line-height: 1;
    }

    /* Reuse the same separator treatment as the right drawer. */
    .data-logger-separator {
        background-color: var(--border-color) !important;
        border-color: var(--border-color) !important;

        opacity: 1 !important;
    }

    /* ── Header row of selects (acts like a table header) ── */

    .data-logger-header-row {
        width: 100%;

        display: flex !important;
        flex-wrap: wrap;
        align-items: stretch;

        gap: 0.4rem !important;

        margin: 0 !important;
        padding: 0.25rem 0 !important;

        overflow-x: auto;
    }

    /* Container that hosts the per-signal cell grid. The grid
       itself is rebuilt by the flush timer when the bridge swaps
       its available_log_fields between sessions, so the container
       must always exist (NiceGUI ``ui.element('div')``). */
    .data-logger-header-container {
        width: 100%;
        margin: 0 !important;
        padding: 0 !important;
    }

    /* Table-header grid — one cell per signal.

       Cells flow horizontally; the row scrolls horizontally if it
       overflows so the scope card never grows in width and the
       overall page layout stays stable.

       Reads visually like a P&ID hardware row: every column is a
       compact, equal-width "label tile" with a clear accent when
       active. The active accent uses --text-highlight (#ffd54f)
       so it lines up with the faceplate amber accent used
       everywhere else in the app (controller modal, performance
       monitor, runtime manager). */
    .data-logger-header-grid {
        width: 100%;

        display: flex !important;
        flex-wrap: nowrap;
        align-items: stretch;

        gap: 0.45rem !important;

        margin: 0 !important;
        padding: 0.5rem 0 0.4rem 0 !important;

        overflow-x: auto;
    }

    .data-logger-header-grid-empty {
        flex: 1 1 100%;

        padding: 0.4rem 0.6rem;

        color: var(--text-muted);

        font-family: var(--font-control-ui);
        font-size: 0.72rem;
        font-style: italic;

        background-color: rgba(255, 255, 255, 0.02);

        border: 1px dashed rgba(255, 255, 255, 0.08);
        border-radius: 5px;
    }

    .data-logger-header-cell {
        flex: 0 0 auto;
        min-width: 110px;
        max-width: 200px;

        display: flex !important;
        flex-direction: column;
        align-items: stretch;
        justify-content: center;

        gap: 0.1rem;

        padding: 0.4rem 0.55rem;

        font-family: var(--font-control-ui);

        background-color: rgba(255, 255, 255, 0.035);

        border: 1px solid rgba(255, 255, 255, 0.10);
        border-radius: 4px;

        user-select: none;
        cursor: pointer;

        transition:
            background-color 0.12s ease,
            border-color 0.12s ease,
            color 0.12s ease,
            box-shadow 0.12s ease;
    }

    .data-logger-header-cell:hover {
        background-color: rgba(255, 214, 0, 0.06);
        border-color: rgba(255, 214, 0, 0.35);
    }

    .data-logger-header-cell-tag {
        color: var(--text-main);

        font-family: var(--font-control-ui);
        font-size: 0.72rem;
        font-weight: 700;

        letter-spacing: 0.04em;
        text-transform: uppercase;

        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .data-logger-header-cell-meta {
        color: var(--text-muted);

        font-family: var(--font-control-ui);
        font-size: 0.65rem;
        font-weight: 700;

        letter-spacing: 0.04em;
        text-transform: uppercase;

        white-space: nowrap;
    }

    /* Active state — column is in the bridge's selected_log_fields
       and its values stream into the log below. */
    .data-logger-header-cell-active {
        background-color: rgba(255, 214, 0, 0.14);
        border-color: var(--text-highlight, #ffd54f);

        box-shadow:
            inset 0 0 0 1px rgba(255, 214, 0, 0.25),
            0 0 0 1px rgba(255, 214, 0, 0.10);
    }

    .data-logger-header-cell-active .data-logger-header-cell-tag {
        color: var(--text-white);
    }

    .data-logger-header-cell-active .data-logger-header-cell-meta {
        color: var(--text-highlight, #ffd54f);
    }

    .data-logger-header-cell-active:hover {
        background-color: rgba(255, 214, 0, 0.22);
        border-color: var(--text-highlight, #ffd54f);
    }

    /* Inactive state — column is hidden; click to toggle on. */
    .data-logger-header-cell-inactive {
        color: var(--text-muted);
    }

    /* Read-only prefix columns (realtime / step / sim_min). The
       bridge always emits these, so the user can't toggle them. */
    .data-logger-header-cell-readonly {
        cursor: default;

        background-color: rgba(255, 213, 79, 0.08);
        border-color: rgba(255, 213, 79, 0.22);
    }

    .data-logger-header-cell-readonly:hover {
        background-color: rgba(255, 213, 79, 0.12);
        border-color: rgba(255, 213, 79, 0.32);
    }

    .data-logger-header-cell-readonly .data-logger-header-cell-tag {
        color: var(--text-highlight);
    }

    .data-logger-header-cell-readonly .data-logger-header-cell-meta {
        color: var(--text-muted);
    }

    /* The multi-select control itself — kept as a fallback rule
       (still used by `data_logger_unavailable` if a future variant
       wants a consolidated picker). */
    .data-logger-header-select {
        flex: 1 1 100%;
        min-width: 220px;

        background-color: rgba(255, 255, 255, 0.035);

        border: 1px solid rgba(255, 255, 255, 0.10);
        border-radius: 5px;

        padding: 0 0.35rem;
    }

    .data-logger-header-select .q-field__control,
    .data-logger-header-select .q-field__inner {
        min-height: 36px !important;
    }

    .data-logger-header-select .q-field__label {
        color: var(--text-muted) !important;
        font-family: var(--font-control-ui) !important;
        font-size: 0.7rem !important;
        letter-spacing: 0.04em;
        text-transform: uppercase;
    }

    .data-logger-header-select .q-field__native,
    .data-logger-header-select input {
        color: var(--text-main) !important;
        font-family: var(--font-control-ui) !important;
        font-size: 0.75rem !important;
    }

    .data-logger-header-select .q-chip {
        background-color: rgba(255, 214, 0, 0.14) !important;
        color: var(--text-highlight, #ffd54f) !important;

        font-family: var(--font-control-ui) !important;
        font-size: 0.7rem !important;

        border: 1px solid rgba(255, 214, 0, 0.40);
    }

    .data-logger-header-select .q-chip .q-icon {
        color: var(--text-white) !important;
    }

    /* Popup menu shown when the user opens the select. */
    .data-logger-select-menu {
        background-color: var(--bg-panel) !important;
        color: var(--text-main) !important;

        border: 1px solid var(--border-color);
        border-radius: 6px;

        font-family: var(--font-control-ui);
        font-size: 0.75rem;
    }

    .data-logger-select-menu .q-item {
        min-height: 30px !important;
        padding: 0.15rem 0.6rem !important;
    }

    .data-logger-select-menu .q-item__label {
        color: var(--text-main) !important;
        font-family: var(--font-control-ui) !important;
        font-size: 0.72rem !important;
    }

    .data-logger-select-menu .q-item--active,
    .data-logger-select-menu .q-item:hover {
        background-color: rgba(255, 255, 255, 0.06) !important;
    }

    /* ── Streamed log widgets ───────────────────────────── */

    .data-logger-log {
        width: 100%;
        min-height: 200px;
        max-height: 300px;

        margin: 0.2rem 0 0 0 !important;
        padding: 0.6rem 0.75rem !important;

        color: var(--text-main);

        font-family: var(--font-mono);
        font-size: 0.72rem;
        line-height: 1.45;

        background-color: rgba(0, 0, 0, 0.50);

        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 5px;

        /* DCS-style fixed-width output — emitted by
           ``GenericBridge._format_log_row(dcs_style=True)`` — relies
           on a strict monospace alignment. ``white-space: pre``
           keeps the spaces verbatim (no collapse, no word-wrap),
           ``overflow-x: auto`` lets wide rows scroll horizontally
           instead of falling off the bottom, and ``letter-spacing: 0``
           defends against any inherited tracking that would break
           column alignment in a monospace font. */
        white-space: pre !important;
        overflow-x: auto !important;
        letter-spacing: 0 !important;
        tab-size: 4;
    }

    .data-logger-info-card {
        /* Extra breathing room before the Info card so it visually
           feels like a "footer" relative to the three scope cards. */
        margin-top: 0.75rem;
    }

    .data-logger-info-log {
        min-height: 120px;
        max-height: 180px;

        color: var(--text-soft);

        /* Info card uses the same DCS-style prefix
           ``[YYYY-MM-DD HH:MM:SS.mmm] LEVL [mode      ] message``
           emitted from ``data_logger.py:_flush_log``. Stick with
           the monospace font so the bracket alignment matches the
           step rows even when the Info card is the only one
           visible. */
        font-family: var(--font-mono) !important;
        white-space: pre !important;
        overflow-x: auto !important;
        letter-spacing: 0 !important;
    }

    /* ── Generic hint text reused by the "no engine" view ── */

    .data-logger-hint {
        color: var(--text-muted);

        font-family: var(--font-control-ui);
        font-size: 0.72rem;
        font-weight: 500;
    }
}


/* ===== control_panel/faceplate.css ===== */
/* ui_root/static/css/control_panel/faceplate.css */

@layer pages {

    /* =========================================================
       FACEPLATE ROOT
       DCS-style right-drawer faceplate.
       Fills the existing .pid-right-drawer-inner container.
       ========================================================= */

    .faceplate-root {
        width: 100%;
        height: 100%;
        min-height: 0;

        display: flex !important;
        flex-direction: column;

        gap: 0.55rem !important;

        margin: 0 !important;
        padding: 0.7rem 0.7rem 0.85rem !important;

        font-family: var(--font-control-ui);

        overflow-x: hidden;
        overflow-y: auto;

        /* Container query context — lets the mode-badge text
           auto-hide when the drawer is narrow (e.g. 200px
           single-bar indicator). */
        container-type: inline-size;
        container-name: faceplate-root;
    }


    /* =========================================================
       FACEPLATE HEADER
       Tag + title on the left, mode badge + close on the right
       ========================================================= */

    .faceplate-header {
        width: 100%;

        display: flex !important;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;

        gap: 0.4rem;
        margin: 0 !important;
        padding: 0.4rem 0.5rem !important;

        background:
            linear-gradient(180deg, rgba(255, 214, 0, 0.08), rgba(255, 214, 0, 0.0)),
            rgba(255, 255, 255, 0.025) !important;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 6px;

        /* Single-line header — never wrap to a second line
           regardless of drawer width. The right cluster (mode
           badge + close button) keeps its full size; the left
           cluster (tag + title) truncates to make room. */
        flex-wrap: nowrap !important;
        min-width: 0;
    }

    .faceplate-header-text {
        /* Allow the tag/title cluster to shrink and truncate
           when the drawer is narrow (e.g. 200px for single-bar
           indicators). Without this the long titles would push
           the close button off-screen.

           The ``min-width: var(--faceplate-input-w, 60px)``
           line ties the truncation threshold to the longest
           input value (set from Python in
           ``FaceplatePanel._apply_drawer_size``). The cluster
           can shrink down to the input's own width before the
           title starts clipping — so the header column always
           matches the input column visually. */
        min-width: var(--faceplate-input-w, 60px);
        flex: 1 1 auto;
        overflow: hidden;
    }

    .faceplate-header-text .faceplate-title {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
    }

    .faceplate-header-text .faceplate-tag {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
    }

    .faceplate-header-right {
        flex: 0 0 auto;
    }

    .faceplate-header-text {
        gap: 0.05rem;
        margin: 0 !important;
        padding: 0 !important;
    }

    .faceplate-tag {
        color: var(--text-highlight);

        font-family: var(--font-mono);
        font-size: 0.95rem;
        font-weight: 700;
        line-height: 1;
        letter-spacing: 0.06em;
    }

    .faceplate-title {
        color: var(--text-muted);

        font-family: var(--font-control-ui);
        font-size: 0.62rem;
        font-weight: 600;
        line-height: 1;
        text-transform: uppercase;
        letter-spacing: 0.04em;
    }

    .faceplate-header-right {
        align-items: center;
        gap: 0.35rem;
    }

    .faceplate-mode-badge {
        display: flex !important;
        align-items: center;
        gap: 0.32rem;

        padding: 0.18rem 0.45rem !important;

        background-color: rgba(0, 0, 0, 0.32) !important;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 4px;

        flex: 0 0 auto;
        white-space: nowrap;
    }

    /* When the drawer (and therefore the input column) is
       narrow, drop the AUTO/MANUAL/OFF text and keep just the
       coloured status dot — the operator still sees the colour
       cue without crowding the close button. The threshold is
       keyed off the input width (set by Python as
       ``--faceplate-input-w``) so the badge text hides exactly
       when the input would otherwise need the same space. */
    @container faceplate-root (max-width: 220px) {
        .faceplate-mode-text { display: none !important; }
    }

    .faceplate-status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #4caf50;
        box-shadow: 0 0 6px rgba(76, 175, 80, 0.55);
    }

    .faceplate-status-auto {
        background: #4caf50 !important;
        box-shadow: 0 0 6px rgba(76, 175, 80, 0.55) !important;
    }

    .faceplate-status-manual {
        background: #ffb300 !important;
        box-shadow: 0 0 6px rgba(255, 179, 0, 0.55) !important;
    }

    .faceplate-status-off {
        background: #9e9e9e !important;
        box-shadow: 0 0 6px rgba(158, 158, 158, 0.45) !important;
    }

    .faceplate-mode-text {
        color: var(--text-white);

        font-family: var(--font-mono);
        font-size: 0.65rem;
        font-weight: 700;
        line-height: 1;
        letter-spacing: 0.06em;
    }

    .faceplate-close-btn {
        color: var(--text-white) !important;
    }


    /* =========================================================
       BARGRAPHS

       Three side-by-side vertical bargraphs (PV, SP, OP).
       Each bargraph is a tall rectangle with a fill that grows
       from the bottom. The fill is positioned absolutely at the
       bottom of the track; its height is updated in % by the
       faceplate's live flusher.
       ========================================================= */

    .faceplate-bars {
        width: 100%;

        display: flex !important;
        flex-direction: row;
        align-items: stretch;
        justify-content: center;

        gap: 3rem;
        margin: 0 !important;
        padding: 0 !important;
    }

    /* When all three bars are visible, center the row and let
       the small gap separate them — the bars sit in the middle
       of the drawer, not stretched edge-to-edge. When only the
       PV bar is visible (read-only indicator), the row also
       centers around it. The active variant is driven by a
       modifier class set on the bargraph row. */
    .faceplate-bars.faceplate-bars-3 {
        justify-content: center;
    }

    .faceplate-bars.faceplate-bars-1 {
        justify-content: center;
    }

    .faceplate-bar-col {
        flex: 0 0 auto;
        width: 30px;
        min-width: 30px;
        max-width: 30px;

        display: flex !important;
        flex-direction: column;
        align-items: stretch;
        justify-content: flex-start;

        gap: 0.25rem;
        margin: 0 !important;
        padding: 0 !important;
    }

    .faceplate-bar-label {
        text-align: center;

        font-family: var(--font-control-ui);
        font-size: 0.65rem;
        font-weight: 700;
        line-height: 1;
        letter-spacing: 0.08em;
    }

    .faceplate-bar-label-pv {
        color: var(--text-highlight);
    }

    .faceplate-bar-label-sp {
        color: #4dd0e1;
    }

    .faceplate-bar-label-op {
        color: #ce93d8;
    }

    .faceplate-bar-track {
        position: relative;

        width: 100%;
        height: 140px;
        min-height: 140px;

        background:
            repeating-linear-gradient(
                0deg,
                rgba(255, 255, 255, 0.04) 0,
                rgba(255, 255, 255, 0.04) 1px,
                transparent 1px,
                transparent 18px
            ),
            linear-gradient(180deg, #0a0d14, #161b25) !important;

        border: 1px solid rgba(255, 255, 255, 0.10);
        border-radius: 4px;

        overflow: hidden;
        box-shadow: inset 0 0 6px rgba(0, 0, 0, 0.45);
    }

    .faceplate-bar-fill {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;

        height: 0%;

        transition: height 0.18s ease-out;
    }

    .faceplate-bar-fill-pv {
        background: linear-gradient(
            180deg,
            rgba(255, 214, 0, 0.05) 0%,
            rgba(255, 214, 0, 0.85) 60%,
            rgba(255, 167, 38, 1.0) 100%
        );
        box-shadow:
            inset 0 1px 0 rgba(255, 255, 255, 0.25),
            0 0 12px rgba(255, 214, 0, 0.45);
    }

    .faceplate-bar-fill-sp {
        background: linear-gradient(
            180deg,
            rgba(77, 208, 225, 0.05) 0%,
            rgba(77, 208, 225, 0.85) 60%,
            rgba(38, 198, 218, 1.0) 100%
        );
        box-shadow:
            inset 0 1px 0 rgba(255, 255, 255, 0.25),
            0 0 12px rgba(77, 208, 225, 0.45);
    }

    .faceplate-bar-fill-op {
        background: linear-gradient(
            180deg,
            rgba(206, 147, 216, 0.05) 0%,
            rgba(206, 147, 216, 0.85) 60%,
            rgba(171, 71, 188, 1.0) 100%
        );
        box-shadow:
            inset 0 1px 0 rgba(255, 255, 255, 0.25),
            0 0 12px rgba(171, 71, 188, 0.45);
    }

    .faceplate-bar-sp-marker {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0%;

        height: 2px;

        background-color: #4dd0e1;
        box-shadow: 0 0 4px rgba(77, 208, 225, 0.85);

        pointer-events: none;
        transition: bottom 0.18s ease-out;
    }

    .faceplate-bar-value {
        text-align: center;

        color: var(--text-white);

        font-family: var(--font-mono);
        font-size: 0.85rem;
        font-weight: 700;
        line-height: 1;
        letter-spacing: 0.02em;
    }

    .faceplate-bar-unit {
        text-align: center;

        color: var(--text-muted);

        font-family: var(--font-control-ui);
        font-size: 0.6rem;
        font-weight: 600;
        line-height: 1;
        letter-spacing: 0.04em;
        text-transform: uppercase;
    }


    /* =========================================================
       SECTION DIVIDERS / TITLES
       ========================================================= */

    .faceplate-section-separator {
        background-color: rgba(255, 255, 255, 0.08) !important;
        border-color: rgba(255, 255, 255, 0.08) !important;
        opacity: 1 !important;
    }

    .faceplate-section {
        width: 100%;

        display: flex !important;
        flex-direction: column;
        align-items: stretch;

        gap: 0.32rem;
        margin: 0 !important;
        padding: 0.5rem 0.55rem !important;

        background-color: rgba(0, 0, 0, 0.18) !important;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 5px;
    }

    .faceplate-section-title {
        color: var(--text-highlight);

        font-family: var(--font-control-ui);
        font-size: 0.66rem;
        font-weight: 700;
        line-height: 1;
        letter-spacing: 0.06em;
        text-transform: uppercase;
    }


    /* =========================================================
       INPUT ROWS
       Mirrors .tic-param-row from the modal so the user sees
       the same fields in the same order.
       ========================================================= */

    .faceplate-input-row {
        width: 100%;
        min-height: 22px;

        display: grid !important;
        grid-template-columns: 38px minmax(0, 1fr) 70px;

        align-items: center;
        column-gap: 6px;

        margin: 0 !important;
        padding: 0 !important;
    }

    .faceplate-input-row > * {
        min-width: 0;
    }

    .faceplate-input-label {
        color: var(--text-white);

        font-family: var(--font-control-ui);
        font-size: 0.7rem;
        font-weight: 700;
        line-height: 1;
        white-space: nowrap;
    }

    .faceplate-input-field {
        width: 100%;
    }

    /* Readonly state — dim the text and remove the focus
       highlight so the operator can see at a glance which
       inputs are live vs. display-only. Mirrors the modal's
       ``.tic-param-readonly-value`` style. */
    .faceplate-input-field.faceplate-readonly .q-field__native,
    .faceplate-input-field.faceplate-readonly .q-field__input,
    .faceplate-input-field.faceplate-readonly .q-field__control-container,
    .faceplate-input-field.faceplate-readonly input {
        color: var(--text-soft) !important;
        opacity: 0.7 !important;
    }

    .faceplate-input-field.faceplate-readonly .q-field__control {
        background-color: rgba(27, 27, 27, 0.6) !important;
    }

    .faceplate-input-field .q-field__control {
        height: 22px !important;
        min-height: 22px !important;

        background-color: rgba(27, 27, 27, 0.94) !important;
        border-radius: 4px !important;

        padding: 0 4px !important;
        box-shadow: none !important;
    }

    .faceplate-input-field .q-field__native,
    .faceplate-input-field .q-field__input,
    .faceplate-input-field .q-field__control-container {
        height: 22px !important;
        min-height: 22px !important;
        line-height: 22px !important;

        padding: 0 !important;

        color: var(--text-white) !important;
        font-family: var(--font-control-ui) !important;
        font-size: 0.7rem !important;
        text-align: center !important;
    }

    .faceplate-input-field input {
        color: var(--text-white) !important;
        font-family: var(--font-control-ui) !important;
        font-size: 0.7rem !important;
        text-align: center !important;
    }

    .faceplate-input-field .q-field__append {
        height: 22px !important;
        min-height: 22px !important;
        color: var(--text-white) !important;
        padding-left: 2px !important;
    }

    .faceplate-input-field .q-field__bottom {
        display: none !important;
    }

    .faceplate-input-unit {
        color: var(--text-muted);

        font-family: var(--font-control-ui);
        font-size: 0.6rem;
        line-height: 1.2;

        text-align: left;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }


    /* =========================================================
       MODE SELECT (popup styling)
       ========================================================= */

    .faceplate-mode-popup {
        /* Lock the dropdown width to the Mode select's own
           width so the Quasar ``q-menu`` portal doesn't
           stretch to fill the right-drawer body. The
           ``.faceplate-input-row`` grid is 38px/1fr/70px, so
           the Mode field occupies the full 1fr column —
           approximately 110 px on a 220 px single-bar
           indicator drawer, slightly wider on a 360 px
           TIC-100 drawer. We pin it to 110 px so single-bar
           indicators and full TIC-100 drawers both show the
           same dropdown shape. The companion rules below
           cap each item at 22 px tall, so a 110 px wide ×
           ~68 px tall (3 items) menu is the intended shape. */
        width: 110px;
        min-width: 110px;
        max-width: 110px;

        background-color: #1b1b1b !important;
        color: var(--text-white) !important;

        border: 1px solid #303030 !important;
        border-radius: 4px !important;

        box-shadow: none !important;
    }

    .faceplate-mode-popup .q-item {
        min-height: 22px !important;
        height: 22px !important;

        padding: 0 8px !important;

        color: var(--text-white) !important;
        font-family: var(--font-control-ui) !important;
        font-size: 0.7rem !important;
    }

    .faceplate-mode-popup .q-item__section {
        padding: 0 !important;
        min-width: 0 !important;
    }

    .faceplate-mode-popup .q-item__label {
        color: var(--text-white) !important;
        font-family: var(--font-control-ui) !important;
        font-size: 0.7rem !important;
        line-height: 22px !important;
    }

    .faceplate-mode-popup .q-item:hover {
        background-color: #2a2a2a !important;
    }

    .faceplate-mode-popup .q-item--active {
        background-color: #3a3000 !important;
    }

    .faceplate-mode-popup .q-item--active .q-item__label {
        color: var(--text-highlight) !important;
        font-weight: 700;
    }


    /* =========================================================
       APPLY BUTTON
       ========================================================= */

    .faceplate-apply-btn {
        align-self: stretch;

        height: 26px !important;
        min-height: 26px !important;

        padding: 0 12px !important;
        border-radius: 4px !important;

        font-family: var(--font-control-ui) !important;
        font-size: 0.72rem !important;
        font-weight: 700 !important;

        background: transparent !important;
        color: var(--text-highlight) !important;
        border: 1px solid rgba(255, 214, 0, 0.90) !important;
        box-shadow: none !important;
        text-transform: none !important;
    }

    .faceplate-apply-btn .q-btn__content {
        color: var(--text-highlight) !important;
    }

    .faceplate-apply-btn:hover {
        background-color: rgba(255, 214, 0, 0.14) !important;
    }


    /* =========================================================
       FLOATING DIALOG HOST (FaceplateDialog)
       ---------------------------------------------------------
       The faceplate is now a ``ui.dialog`` (see
       ``app/components/faceplate_dialog.py``) instead of a
       right-drawer. The styles below turn the dialog's host
       card into a floating panel: positioned absolutely inside
       Quasar's ``.q-dialog__inner``, sized via the same
       CSS custom-property pattern the runtime manager uses,
       and tagged so the
       :class:`app.components.floating_window.DraggableCard` JS
       can find it across DOM swaps.

       Mirrors ``body .floating-runtime-manager-card`` in
       ``simulation_manager_page.css:248`` so the two dialogs
       read as the same family of floating cards.
       ========================================================= */

    body .faceplate-dialog-card {
        /* Quasar's ``.q-dialog__inner`` is ``position: fixed;
           inset: 0; display: flex; justify-content: center;
           align-items: center;``. The card sits
           ``position: absolute`` inside that flex container,
           so it's centered in the viewport automatically —
           no JS math, no race with the show-transition.

           ``--faceplate-drawer-offset`` (default 0) is the
           same drawer-aware centering hook the runtime
           manager uses. When the control-panel's left drawer
           is open the offset is set to half the drawer
           width so the dialog appears centered in the
           content area instead of the full viewport. */
        position: absolute !important;
        margin-left: var(--faceplate-drawer-offset, 0px) !important;

        /* User-resizable defaults. Width / max-height are
           read from CSS custom properties so the JS
           multi-edge resize handler in
           ``app/components/floating_window.py`` can persist
           the user's drag of any resize handle to
           ``sessionStorage`` and replay it on the next open. */
        width: var(
            --faceplate-dialog-card-width,
            min(360px, calc(100vw - 2rem))
        ) !important;
        height: var(
            --faceplate-dialog-card-height,
            auto
        ) !important;
        max-height: calc(100vh - 1rem) !important;

        min-width: 320px;
        min-height: 360px;
        max-width: calc(100vw - 1rem);

        /* ``overflow: visible`` so absolutely-positioned resize
           handles (3 px outside the card on N/E/S/W edges) are
           not clipped.  The inner ``.faceplate-root`` keeps
           ``overflow-y: auto`` so scrollbars stay inside the
           rounded corners. */
        overflow: visible;

        z-index: 1000;

        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.55) !important;
    }

    /* Quasar's show-transition centers the card via the
       ``.q-dialog__inner`` flex layout. Keep that flex
       centering on the inner in both cases (the card
       itself receiving the ``q-dialog__inner`` class on
       some Quasar versions, vs the inner being a separate
       element). */
    body .faceplate-dialog-card.q-dialog__inner,
    .q-dialog__inner:has(> .faceplate-dialog-card) {
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
        min-height: 0 !important;
        transform: none !important;
        padding: 0 !important;
    }

    /* Drag handle. The card's header row carries both
       ``.faceplate-header`` (the body styles) and
       ``.faceplate-dialog-header`` (the drag-handle
       marker the DraggableCard JS targets). */
    body .faceplate-dialog-card
        .faceplate-dialog-header {
        cursor: grab;
        touch-action: none;
    }

    body .faceplate-dialog-card
        .faceplate-dialog-header:active {
        cursor: grabbing;
    }

    /* Minimize button. The runtime manager pattern uses
       a round dense button next to the close button; we
       match that here so the chrome reads as the same
       family of floating cards. */
    .faceplate-minimize-btn {
        color: var(--text-white) !important;
    }

    /* 8-direction resize handles. Mounted by
       ``DraggableCard`` as 8 absolute-positioned divs
       with class
       ``faceplate-dialog-card-resize-handle[-<side>]``.
       The handles sit on top of the card edges / corners
       and let the user grab any side to resize. ``pointer
       events: auto`` overrides any parent rule that
       would otherwise block them; the handles are
       transparent (no background) so they don't visually
       compete with the body. */
    .faceplate-dialog-card-resize-handle {
        position: absolute;
        z-index: 1001;
        background: transparent;
        pointer-events: auto;
        touch-action: none;
    }

    .faceplate-dialog-card-resize-handle-n,
    .faceplate-dialog-card-resize-handle-s {
        left: 8px;
        right: 8px;
        height: 6px;
    }
    .faceplate-dialog-card-resize-handle-n { top: -3px; cursor: ns-resize; }
    .faceplate-dialog-card-resize-handle-s { bottom: -3px; cursor: ns-resize; }

    .faceplate-dialog-card-resize-handle-e,
    .faceplate-dialog-card-resize-handle-w {
        top: 8px;
        bottom: 8px;
        width: 6px;
    }
    .faceplate-dialog-card-resize-handle-e { right: -3px; cursor: ew-resize; }
    .faceplate-dialog-card-resize-handle-w { left: -3px; cursor: ew-resize; }

    .faceplate-dialog-card-resize-handle-ne,
    .faceplate-dialog-card-resize-handle-nw,
    .faceplate-dialog-card-resize-handle-se,
    .faceplate-dialog-card-resize-handle-sw {
        width: 14px;
        height: 14px;
    }
    .faceplate-dialog-card-resize-handle-ne { top: -3px; right: -3px; cursor: nesw-resize; }
    .faceplate-dialog-card-resize-handle-nw { top: -3px; left: -3px; cursor: nwse-resize; }
    .faceplate-dialog-card-resize-handle-se { bottom: -3px; right: -3px; cursor: nwse-resize; }
    .faceplate-dialog-card-resize-handle-sw { bottom: -3px; left: -3px; cursor: nesw-resize; }

    /* Minimized state — collapse the body to a header strip
       (the same affordance the runtime manager's
       ``sim-manager-minimized`` class provides). We hide
       every direct child of the card EXCEPT the header row
       so the user still sees the tag, title, mode badge,
       minimize, and close controls. */
    body .faceplate-dialog-card.faceplate-dialog-card-minimized
        > *:not(.faceplate-dialog-header):not(.faceplate-header) {
        display: none !important;
    }

    body .faceplate-dialog-card.faceplate-dialog-card-minimized {
        height: auto !important;
        min-height: 0 !important;
        max-height: none !important;
    }

    /* Hide resize handles while minimized */
    body .faceplate-dialog-card.faceplate-dialog-card-minimized
        .faceplate-dialog-card-resize-handle {
        display: none !important;
    }

    /* Re-enable pointer events on the card itself when
       minimized so the header buttons remain clickable
       even though the dialog wrapper may flip them off. */
    body .faceplate-dialog-card.faceplate-dialog-card-minimized {
        pointer-events: auto !important;
    }

    /* =========================================================
       NON-MODAL BEHAVIOUR — page stays active / scrollable
       ---------------------------------------------------------
       The faceplate dialog is a floating HUD, not a modal that
       blocks the dashboard. We flip pointer-events so the user
       can still pan the P&ID, click controllers, and scroll
       sections while the faceplate is open.
       ========================================================= */

    /* Dialog wrapper: let clicks pass through to the page. */
    .q-dialog:has(> .q-dialog__inner > .faceplate-dialog-card) {
        pointer-events: none !important;
    }
    /* Backdrop: fully transparent and non-interactive. */
    .q-dialog:has(> .q-dialog__inner > .faceplate-dialog-card)
        .q-dialog__backdrop {
        background: transparent !important;
        opacity: 0 !important;
        pointer-events: none !important;
    }
    /* Inner flex wrapper: also pass-through. */
    .q-dialog:has(> .q-dialog__inner > .faceplate-dialog-card)
        .q-dialog__inner {
        pointer-events: none !important;
    }
    /* The card itself: re-enable so header buttons, inputs,
       resize handles, and drag remain usable. */
    body .faceplate-dialog-card {
        pointer-events: auto !important;
    }

    /* =========================================================
       SCROLL AT MINIMUM SIZE
       ---------------------------------------------------------
       When the user resizes the faceplate down to its min
       dimensions, the inner body should scroll instead of
       clipping. The header stays fixed; only the body scrolls.
       ========================================================= */
    body .faceplate-dialog-card {
        /* Body already has overflow-y: auto in .faceplate-root,
           but the card itself also needs it so the Quasar card
           wrapper respects the content bounds. */
        overflow: hidden !important;
    }

    body .faceplate-dialog-card .faceplate-root {
        /* Ensure the faceplate body scrolls when content exceeds
           the available height after resize. */
        overflow-y: auto !important;
        overflow-x: hidden !important;
        scrollbar-gutter: auto;
        scroll-behavior: smooth;
    }
}
