    /* ── Floating dialog specific: drag-handle visual hint ── */
    body .floating-runtime-manager-card
        .simulation-manager-page-header {
        position: relative;
    }

    /* Subtle bottom-bar in the header that hints "this row is a
       drag handle" — same low-contrast white the controller modal
       uses for its separator. */
    body .floating-runtime-manager-card
        .simulation-manager-page-header::after {
        content: '';
        position: absolute;
        left: 50%;
        bottom: 2px;
        transform: translateX(-50%);
        width: 28px;
        height: 2px;
        background-color: rgba(255, 255, 255, 0.20);
        border-radius: 1px;
        pointer-events: none;
    }

    /* Snap-to-edge visual hint on the floating card (subtle amber
       glow when card is dragged near a viewport edge). Amber matches
       the brand accent used in the menu's active state and in the
       controller modal's apply/faceplate buttons. */
    body .floating-runtime-manager-card.sim-manager-snapped-left {
        box-shadow:
            -3px 0 0 0 var(--hmi-accent-amber),
            0 18px 42px rgba(0, 0, 0, 0.45),
            0 0 0 1px rgba(255, 213, 79, 0.20) !important;
    }
    body .floating-runtime-manager-card.sim-manager-snapped-right {
        box-shadow:
            3px 0 0 0 var(--hmi-accent-amber),
            0 18px 42px rgba(0, 0, 0, 0.45),
            0 0 0 1px rgba(255, 213, 79, 0.20) !important;
    }
    body .floating-runtime-manager-card.sim-manager-snapped-top {
        box-shadow:
            0 -3px 0 0 var(--hmi-accent-amber),
            0 18px 42px rgba(0, 0, 0, 0.45),
            0 0 0 1px rgba(255, 213, 79, 0.20) !important;
    }


    /* =========================================================
       MULTI-EDGE RESIZE HANDLES
       ---------------------------------------------------------
       8 invisible handles mounted by JS (see
       ``floating_runtime_manager.py:_resize_handles_script``) — 4
       edges (top / right / bottom / left) and 4 corners. Each
       handle is ``position: absolute`` so it doesn't displace
       the card's normal layout, and uses ``pointer-events: auto``
       to capture drag events even though the card itself sits
       inside a dialog wrapper that may flip ``pointer-events:
       none`` when minimized. The cursor hints match the native
       browser hints (``ns-resize`` / ``ew-resize`` / corner
       variants) so the user gets the same affordance they expect
       from any resizable panel. */
    .sim-manager-resize-handle {
        position: absolute;
        z-index: 1002;        /* Above buttons (1002) and card body. */
        background: transparent;
        pointer-events: auto;
        touch-action: none;   /* Pointer-events drag, not browser pan. */
    }

    /* Edges — thin strips that protrude OUTSIDE the card edge so
       they never overlap interactive children near the border
       (e.g. minimize/close buttons in the header, scroll thumbs at
       the side). 8 px of headroom at the ends keeps the corner
       handles priority. */
    .sim-manager-resize-handle-n {
        top: -4px; left: 8px; right: 8px;
        height: 4px;
        cursor: ns-resize;
    }
    .sim-manager-resize-handle-s {
        bottom: -4px; left: 8px; right: 8px;
        height: 4px;
        cursor: ns-resize;
    }
    .sim-manager-resize-handle-e {
        right: -4px; top: 8px; bottom: 8px;
        width: 4px;
        cursor: ew-resize;
    }
    .sim-manager-resize-handle-w {
        left: -4px; top: 8px; bottom: 8px;
        width: 4px;
        cursor: ew-resize;
    }

    /* Corners — 12 px squares overlapping the edge handles so
       they win the pointer-down race when the user is on a
       corner pixel. */
    .sim-manager-resize-handle-ne {
        top: -4px; right: -4px;
        width: 12px; height: 12px;
        cursor: nesw-resize;
    }
    .sim-manager-resize-handle-nw {
        top: -4px; left: -4px;
        width: 12px; height: 12px;
        cursor: nwse-resize;
    }
    .sim-manager-resize-handle-se {
        bottom: -4px; right: -4px;
        width: 14px; height: 14px;
        cursor: nwse-resize;
        /* Subtle diagonal hatch in the bottom-right so users
           who learned the browser-native ``resize: both`` grip
           still see something they recognise. The hatch is the
           same low-contrast white the drag-handle bar in the
           header uses. */
        background:
            linear-gradient(
                135deg,
                transparent 0,
                transparent 35%,
                rgba(255, 255, 255, 0.25) 35%,
                rgba(255, 255, 255, 0.25) 45%,
                transparent 45%,
                transparent 60%,
                rgba(255, 255, 255, 0.25) 60%,
                rgba(255, 255, 255, 0.25) 70%,
                transparent 70%
            );
    }
    .sim-manager-resize-handle-sw {
        bottom: -4px; left: -4px;
        width: 12px; height: 12px;
        cursor: nesw-resize;
    }


    /* Minimize state (body hides everything but the header strip) */
    body .floating-runtime-manager-card.sim-manager-minimized
        .simulation-manager-page-form,
    body .floating-runtime-manager-card.sim-manager-minimized
        .sim-manager-statusbar {
        display: none !important;
    }
    body .floating-runtime-manager-card.sim-manager-minimized {
        max-height: none !important;
        /* Collapse the user-controlled height so the strip is
           exactly tall enough for the header + timer. Without
           this, a previously-resized tall card stays tall (and
           mostly empty) in the minimized state. The JS resize
           handles read the class and skip dispatching during
           minimized — see ``floating_runtime_manager.py``. */
        height: auto !important;
        /* Override the 220 px card min-height so the minimized
           strip can shrink to its natural content size. */
        min-height: 0 !important;
    }

    /* Hide the JS-mounted resize handles while minimized — they
       belong to the full body, not the header-only strip. */
    body .floating-runtime-manager-card.sim-manager-minimized
        .sim-manager-resize-handle {
        display: none !important;
    }

    /* When minimized, the hero ``.sim-manager-timer`` becomes the
       LAST visible row in the card. Two fixups so the strip looks
       like a finished panel instead of a card with a missing
       bottom: (a) round the bottom-left / bottom-right corners to
       match the card's 8px radius; (b) drop the bottom border that
       normally separates the timer from the form below — without
       this, the user sees a hanging hairline at the bottom of the
       strip that reads as "something is hidden under here". */
    body .floating-runtime-manager-card.sim-manager-minimized
        .sim-manager-timer {
        border-bottom: 0 !important;
        border-bottom-left-radius: 8px !important;
        border-bottom-right-radius: 8px !important;
    }

    /* =========================================================
       PASS-THROUGH WHEN MINIMIZED
       ---------------------------------------------------------
       A NiceGUI ``ui.dialog`` mounts THREE layers above the page:

           .q-dialog                    ← fixed full-viewport wrapper
             .q-dialog__backdrop        ← dimmed scrim
             .q-dialog__inner           ← flex centering wrapper
               .floating-runtime-manager-card

       In the normal (open / full-body) state, all three layers
       intercept pointer events — that is the *correct* behaviour
       for a modal dialog. In the minimized state we WANT the
       opposite: the user should be able to keep interacting with
       the underlying dashboard (PID, navbar, etc.) while the
       Runtime Manager strip stays visible as a HUD-style "shelf"
       at the centre of the viewport.

       The trick is a two-step ``pointer-events`` flip:

         1. Set ``pointer-events: none`` on the dialog wrapper,
            backdrop, and inner so they let clicks straight through
            to the page underneath.
         2. Re-enable ``pointer-events: auto`` on the card itself
            so its header drag-handle, minimize/close buttons, and
            hero Current Time strip remain interactive.

       We key the flip on the dialog wrapper having a descendant
       with the ``.sim-manager-minimized`` class. ``:has()`` is
       supported in every browser shipped with Chromium-based
       Quasar/NiceGUI versions in current use (Chrome ≥105, Safari
       ≥15.4, Firefox ≥121). The backdrop is also faded out so
       the dimmed page doesn't read as "still modal".

       Bonus: ``display: none`` on the backdrop in minimized
       state — keeping it at ``pointer-events: none`` is enough
       for behaviour, but hiding it completely removes the visible
       dim and makes the underlying app feel fully live. */
    .q-dialog:has(.floating-runtime-manager-card.sim-manager-minimized) {
        pointer-events: none !important;
    }
    .q-dialog:has(.floating-runtime-manager-card.sim-manager-minimized)
        .q-dialog__backdrop {
        display: none !important;
    }
    .q-dialog:has(.floating-runtime-manager-card.sim-manager-minimized)
        .q-dialog__inner {
        pointer-events: none !important;
        background: transparent !important;
    }
    body .floating-runtime-manager-card.sim-manager-minimized {
        pointer-events: auto !important;
    }

    /* Cursor hint: ``.simulation-manager-page-header`` carries
       ``cursor: grab`` for the drag handle, which is correct over
       the title block / mode pill, but reads as "this whole row is
       inert" over the buttons. Reassert ``cursor: pointer`` on the
       window buttons so the minimize/close affordance feels live
       — the buttons are already excluded from drag-capture via
       ``shouldSkipDrag`` (see floating_runtime_manager.py:443-452),
       this just brings the visual hint in line with the behaviour. */
    body .floating-runtime-manager-card
        .simulation-manager-page-header
        .sim-manager-window-btn {
        cursor: pointer !important;
    }
    body .floating-runtime-manager-card
        .simulation-manager-page-header
        .sim-manager-status-pill {
        cursor: default;
    }


    /* ── Minimize/maximize buttons in header ── */
    .sim-manager-window-btn {
        color: #ffffff !important;
        background-color: transparent !important;

        width: 28px !important;
        min-width: 28px !important;
        height: 28px !important;
        min-height: 28px !important;
        padding: 0 !important;
        border-radius: 0 !important;
        box-shadow: none !important;

        /* Defensive: keep the minimize / close buttons above any
           resize handle that might overlap the header edge. The
           resize handles use z-index: 1002; bump these to 1003
           so the user's click on the button always wins. */
        position: relative;
        z-index: 1003;
    }

    .sim-manager-window-btn .q-btn__content {
        color: inherit !important;
    }

    .sim-manager-window-btn:hover {
        background-color: rgba(198, 40, 40, 0.55) !important;
        color: #ffffff !important;

    /* Keyboard accessibility — the minimize / close buttons sit in
       the drag area; without a visible focus ring, tabbing to them
       would land on an invisible target. Amber matches the brand
       accent used on the active menu item and the apply button in
       the controller modal. */
    .sim-manager-window-btn:focus-visible {
        outline: 2px solid var(--hmi-accent-amber, #ffd54f) !important;
        outline-offset: 1px !important;
    }


    /* ── Status-bar select popups (Scenarios) ──
       Match the controller modal's tic-param-mode-popup palette
       so the dropdown that opens from the Scenario field looks
       like the dropdowns in the controller modals. */
    .sim-manager-mode-popup {
        background-color: #1b1b1b !important;
        color: #ffffff !important;

        border: 1px solid #303030 !important;
        border-radius: 4px !important;

        box-shadow: none !important;
        font-family: var(--font-control-ui) !important;
    }

    .sim-manager-mode-popup .q-item {
        min-height: 24px !important;
        height: 24px !important;

        padding: 0 8px !important;

        color: #ffffff !important;
        font-family: var(--font-control-ui) !important;
        font-size: 0.7rem !important;
    }

    .sim-manager-mode-popup .q-item__section {
        padding: 0 !important;
        min-width: 0 !important;
    }

    .sim-manager-mode-popup .q-item__label {
        color: #ffffff !important;
        font-family: var(--font-control-ui) !important;
        font-size: 0.7rem !important;
        line-height: 24px !important;
    }

    .sim-manager-mode-popup .q-item:hover {
        background-color: #2a2a2a !important;
    }

    .sim-manager-mode-popup .q-item--active {
        background-color: #3a3000 !important;
    }

    .sim-manager-mode-popup .q-item--active .q-item__label {
        color: #ffd54f !important;
        font-weight: 700;
    }


    /* ── Responsive: narrow viewports — collapse 12-col grid to 6-col ── */
    @media (max-width: 60rem) {
        .sim-manager-field { grid-column: span 6 / span 6; }
        .sim-manager-field-wide { grid-column: span 12 / span 12; }
    }

    @media (max-width: 38rem) {
        .sim-manager-field { grid-column: span 12 / span 12; }
    }

    /* When the floating card stretches the wider 720 px layout, the
       hero timer should keep its big digits on small viewports too
       — just dial the font down a touch. */
    @media (max-width: 38rem) {
        .sim-manager-timer-value { font-size: 1.1rem; }
        .sim-manager-timer-unit  { font-size: 0.75rem; }
    }

}

/* ui_root/static/css/tokens.css */

:root {
    /* =========================================================
       01. FONT FAMILY
       ========================================================= */

    --font-ui: "Roboto", "Segoe UI", Arial, sans-serif;
    --font-display: "Segoe UI", "Roboto", Arial, sans-serif;
    --font-mono: "Roboto Mono", "Cascadia Mono", "Consolas", monospace;
    --font-control-ui: "Courier Prime", Courier, monospace;


    /* =========================================================
       02. COLOR — BACKGROUND
       ========================================================= */

    --bg-main: #050505;

    --bg-header: #1a1e29;
    --bg-footer: #1a1e29;

    --bg-panel: #111722;
    --bg-panel-soft: #151c29;
    --bg-panel-hover: #1c2637;


    /* =========================================================
       03. COLOR — BORDER
       ========================================================= */

    --border-color: #2a3441;


    /* =========================================================
       04. COLOR — TEXT / STATE
       ========================================================= */

    --text-main: #e0e0e0;
    --text-muted: #8b949e;
    --text-soft: rgba(224, 224, 224, 0.62);

    --text-highlight: #ffd600;
    --text-success: #4caf50;
    --text-white: #ffffff;

    --text-control: green;


    /* =========================================================
       05. GLOBAL LAYOUT
       ========================================================= */

    --min-viewport-width: 500px;

    --header-h: 64px;
    --footer-h: 40px;


    /* =========================================================
       06. TYPOGRAPHY SCALE
       ========================================================= */

    --app-title-fs: clamp(0.75rem, 1.371vw, 1.2rem);
    --section-title-fs: clamp(0.85rem, 1.714vw, 1.5rem);

    --org-line-1-fs: clamp(0.60rem, 0.914vw, 0.80rem);
    --org-line-2-fs: clamp(0.55rem, 0.800vw, 0.72rem);
    --org-line-3-fs: clamp(0.50rem, 0.720vw, 0.65rem);

    --footer-fs: clamp(0.5rem, 0.8vw, 0.7rem);


    /* =========================================================
       07. GLOBAL SPACING
       ========================================================= */

    --header-gap: clamp(0.3rem, 0.857vw, 0.75rem);
    --header-px: clamp(0.4rem, 1.143vw, 1rem);

    --footer-px: clamp(0.5rem, 1.143vw, 1rem);


    /* =========================================================
       08. HEADER — ORGANIZATION IDENTITY
       ========================================================= */

    --org-block-min-w: 280px;


    /* =========================================================
       09. HEADER — LOGOS
       ========================================================= */

    --header-logo-w: 110px;
    --header-logo-max-h: 46px;

    --org-logo-w: 40px;
    --org-logo-h: 40px;
    --org-logo-max-h: 40px;


    /* =========================================================
       10. CONTROL PANEL DRAWER — WIDTH
       ========================================================= */

    --control-left-drawer-w: 240px;
    --control-left-drawer-w-sm: 200px;


    /* =========================================================
       11. CONTROL PANEL DRAWER — MENU TITLE
       ========================================================= */

    --drawer-menu-title-h: 64px;
    --drawer-menu-title-h-sm: 64px;


    /* =========================================================
       12. CONTROL PANEL DRAWER — MENU ITEM
       ========================================================= */

    --drawer-menu-item-h: 40px;
    --drawer-menu-item-h-sm: 36px;


    /* =========================================================
       13. CONTROL PANEL DRAWER — MENU SPACING
       ========================================================= */

    --drawer-menu-list-gap: 0.5rem;
    --drawer-menu-list-gap-sm: 0.3rem;

    --drawer-menu-list-pt: 1rem;
    --drawer-menu-list-px: 0.35rem;
    --drawer-menu-list-pb: 0.45rem;

    --drawer-menu-list-pt-sm: 0.75rem;
    --drawer-menu-list-px-sm: 0.3rem;
    --drawer-menu-list-pb-sm: 0.4rem;


    /* =========================================================
       14. CONTROL PANEL DRAWER — COLOR
       ========================================================= */

    --drawer-menu-separator-bg: #d32f2f;

    --drawer-menu-item-text: #c9d1d9;
    --drawer-menu-item-active-text: #000000;


    /* =========================================================
       15. PID CANVAS
       ========================================================= */

    --pid-canvas-min-w: 1000px;
    --pid-canvas-min-w-sm: 500px;

    --pid-canvas-py: 1rem;
    --pid-canvas-py-sm: 0.75rem;


    /* =========================================================
       16. PID NAVBAR — LAYOUT
       ========================================================= */

    /*
       Use this to increase PID navbar height without changing

    */

    /* =========================================================

    --pid-navbar-manager-icon-size: 20px;
    --pid-navbar-manager-label-fs: 0.7rem;
    --pid-navbar-manager-icon-label-gap: 0.5rem;


    /* =========================================================
       19. PID NAVBAR — REAL TIME CHECKBOX
       ========================================================= */

    /*
       Realtime checkbox intentionally reuses:
       - --pid-navbar-manager-row-h
       - --pid-navbar-manager-icon-size
       - --pid-navbar-manager-label-fs
       - --pid-navbar-manager-icon-label-gap

       This keeps Simulation Manager and Real Time visually consistent.
    */
    --pid-navbar-realtime-box-color: #ffffff;


    /* =========================================================
       20. PID NAVBAR — SEPARATOR
       ========================================================= */

    --pid-navbar-separator-h: 42px;


    /* =========================================================
       21. PID NAVBAR — ACTION BUTTONS
       ========================================================= */

    --pid-navbar-control-gap: 0.35rem;

    --pid-navbar-action-btn-h: 56px;
    --pid-navbar-action-icon-fs: 28px;
    --pid-navbar-action-label-fs: 0.62rem;


    /* =========================================================
       22. PID NAVBAR — CLOCK
       ========================================================= */

    --pid-navbar-clock-min-w: 190px;
    --pid-navbar-clock-gap: 0.1rem;
    --pid-navbar-clock-pull-left: 0.1rem;

    --pid-navbar-clock-date-fs: 0.62rem;
    --pid-navbar-clock-time-fs: 0.80rem;


    /* =========================================================
       23. PID RIGHT DRAWER
       ========================================================= */

    --pid-right-drawer-w: 350px;
    --pid-right-drawer-w-sm: 330px;

    --pid-right-drawer-offset: 0.75rem;
    --pid-right-drawer-offset-sm: 0.5rem;


    /* =========================================================
       24. PID RIGHT DRAWER — FLOATING TOGGLE
       ========================================================= */

    --pid-right-drawer-toggle-size: 34px;
    --pid-right-drawer-toggle-icon-size: 24px;
    --pid-right-drawer-toggle-gap: 0.5rem;

   /* =========================================================
      25. SIMULATION MANAGER PAGE
      ========================================================= */

    --simulation-manager-page-card-w: 560px;

    /* HMI/DCS accent palette for the Runtime Manager faceplate.
       Colors map back to the rest of the app so the floating card
       reads as the same product:

       - amber/yellow is the brand accent (controller modal title,
         navbar Run/Stop/Reset, monitor plot button active state,
         --text-highlight).
       - success green is the live "running" color (--text-success,
         live PV text, --text-control).
       - the deep backgrounds mirror the controller-modal's
         rgba(17,17,17) section / rgba(27,27,27) input-control
         palette.
       - the grid backdrop uses the same low-alpha white as the
         monitor plot frame divider. */
    --hmi-bg-deep:        #000000;
    --hmi-bg-panel:       #111111;
    --hmi-bg-elev:        #050505;
    --hmi-bg-input:       rgba(27, 27, 27, 0.94);

    --hmi-border:         rgba(255, 255, 255, 0.14);
    --hmi-border-strong:  rgba(255, 255, 255, 0.20);
    --hmi-text-bright:    #ffffff;
    --hmi-text-soft:      #bdbdbd;
    --hmi-text-muted:     #8b949e;
    --hmi-accent-amber:   #ffd54f;
    --hmi-accent-amber-strong: #ffd600;
    --hmi-accent-amber-soft:   rgba(255, 213, 79, 0.14);
    --hmi-accent-green:   #4caf50;
    --hmi-accent-green-bright: #00ff00;
    --hmi-accent-red:     #ff5252;
    --hmi-accent-amber-button: #c62828;
    --hmi-grid:           rgba(255, 255, 255, 0.04);

    /* =========================================================
   25. STHR CONTROLLER CARDS

    --sthr-controller-layer-top: 0.75rem;
    --sthr-controller-layer-left: 0.75rem;

    --sthr-controller-card-w: 230px;
    --sthr-controller-card-gap: 0.45rem;
