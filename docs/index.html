/* ===== control_panel/pid_layout.css ===== */
/* ui_root/static/css/control_panel/pid_layout.css */

@layer pages {

    /* =========================================================
       PID ROOT COLUMN

       Structure:
       .pid-section-root
       ├── .pid-navbar-row
       └── .pid-canvas-row

       Requirement:
       - column has no margin
       - column has no padding
       - background transparent
       ========================================================= */

    .pid-section-root {
        width: 100%;
        height: 100%;
        min-height: 0;

        display: flex !important;
        flex-direction: column;

        gap: 0 !important;

        margin: 0 !important;
        padding: 0 !important;

        background-color: transparent !important;
        color: var(--text-main);

        overflow: hidden !important;
    }


    /* =========================================================
       ROW 1 — NAVBAR ROW

       Important:
       - position relative for drawer toggle slot
       - overflow visible so the toggle button is not clipped
       ========================================================= */

    .pid-navbar-row {
        position: relative;

        width: 100%;

        flex: 0 0 auto;
        min-height: 0;

        display: flex !important;
        flex-direction: row;
        align-items: stretch;

        gap: 0 !important;

        margin: 0 !important;
        padding: 0 !important;

        background-color: transparent !important;

        overflow: visible !important;
    }

    /*
       Do NOT apply width:100% to the drawer toggle slot.
       This prevents the navbar toggle button from disappearing.
    */
    .pid-navbar-row > :not(.pid-navbar-drawer-toggle-slot) {
        width: 100%;

        margin: 0 !important;
        padding: 0 !important;
    }

    /*
       Optional spacing so navbar content does not overlap the right toggle.
       This assumes render_pid_navbar root has class .pid-navbar.
    */
    .pid-navbar-row .pid-navbar {
        padding-right: calc(
            var(--pid-navbar-drawer-toggle-right, 0.75rem)
            + var(--pid-navbar-drawer-toggle-size, 32px)
            + 0.5rem
        ) !important;
    }


    /* =========================================================
       ROW 2 — CANVAS ROW

       Stable container:
       - owns the overlay right drawer
       - does not scroll itself
       - inner .pid-canvas-scroll-viewport handles horizontal scroll
       ========================================================= */

    .pid-canvas-row {
        position: relative;

        width: 100%;

        flex: 1 1 auto;
        min-height: 0;

        display: flex !important;
        flex-direction: row;
        align-items: stretch;

        gap: 0 !important;

        margin: 0 !important;
        padding: 0 !important;

        background-color: transparent !important;

        overflow: hidden !important;
    }


    /* =========================================================
       CANVAS SCROLL VIEWPORT

       This is the only horizontal scroll area.
       Right drawer is outside this flow, so content does not move.
       ========================================================= */

    .pid-canvas-scroll-viewport {
        width: 100%;
        height: 100%;
        min-height: 0;

        flex: 1 1 auto;

        display: flex !important;
        flex-direction: row;
        align-items: stretch;

        gap: 0 !important;

        margin: 0 !important;
        padding: 0 !important;

        background-color: transparent !important;

        overflow-x: auto !important;
        overflow-y: hidden !important;

        scrollbar-gutter: auto;
        overscroll-behavior-x: contain;
        overscroll-behavior-y: none;
        -webkit-overflow-scrolling: touch;
    }


    /* =========================================================
       PID SCROLL CANVAS

       Stable canvas:
       - height follows row 2
       - width is at least 100%
       - width can exceed viewport to activate horizontal scroll
       ========================================================= */

    .pid-scroll-canvas {
        height: 100%;
        min-height: 100%;

        width: max(100%, var(--pid-canvas-min-w, 1400px));
        min-width: 100%;

        flex: 0 0 auto;

        display: flex !important;
        flex-direction: row;
        align-items: stretch;
        justify-content: center;

        gap: 0 !important;

        margin: 0 !important;

        padding-top: var(--pid-canvas-py, 1rem) !important;
        padding-bottom: var(--pid-canvas-py, 1rem) !important;
        padding-left: 0 !important;
        padding-right: 0 !important;

        background-color: transparent !important;

        overflow: hidden !important;
    }


    /* =========================================================
       PID CONTENT
       ========================================================= */

    .pid-content {
        position: relative;

        width: 100%;
        height: 100%;
        min-height: 0;
        min-width: 0;

        flex: 1 1 auto;

        display: flex !important;
        align-items: center;
        justify-content: center;

        gap: 0 !important;

        margin: 0 !important;
        padding: 0 !important;

        background-color: transparent !important;
        color: var(--text-main);

        border: none;
        border-radius: 0;

        /* Allow the SVG to be fully visible at its natural aspect ratio
           without being clipped. The horizontal scroll viewport wraps
           this container, so overflow is handled there. */
        overflow: visible;
    }
}

@layer pages {

/* ===== control_panel/pid_svg.css ===== */
/* ui_root/static/css/control_panel/pid_svg.css */

@layer pages {

    /* =========================================================
       STHR PID SVG
       ========================================================= */

    .sthr-pid-svg {
        width: 100%;
        height: 100%;
        min-height: 0;
        min-width: 0;

        display: flex !important;
        align-items: center;
        justify-content: center;

        margin: 0 !important;
        padding: 0 !important;

        background-color: transparent !important;

        /* Keep SVG visible; allow horizontal scroll on parent viewport. */
        overflow: visible;
    }

    .sthr-pid-svg svg {
        /* Natural 1001×540.225 viewBox; let SVG scale to fit its container
           while preserving aspect ratio (no clipping, no stretching). */
        display: block;

        width: auto;
        height: auto;
        max-width: 100%;
        max-height: 100%;

        margin: 0 auto !important;
        padding: 0 !important;

        background-color: transparent !important;

        /* Inline preserveAspectRatio ensures the SVG uniformly scales
           inside its container. Matches the V1.1 reference behavior. */
        preserveAspectRatio: xMidYMid meet;
    }

    /* =========================================================
       BIODIESEL PID SVG

       Identical layout rules to .sthr-pid-svg. The biodiesel
       viewBox is 1343×805 (vs STHR's 1001×540.225) so the rendered
       drawing is naturally slightly taller, but the SVG itself
       fills the same container width and grows its height to
       maintain the aspect ratio — so the cards render at the
       same per-container size as STHR's.
       ========================================================= */

    .biodiesel-pid-svg {
        width: 100%;
        height: 100%;
        min-height: 0;
        min-width: 0;

        display: flex !important;
        align-items: center;
        justify-content: center;

        margin: 0 !important;
        padding: 0 !important;

        background-color: transparent !important;

        /* Keep SVG visible; allow horizontal scroll on parent viewport. */
        overflow: visible;
    }

    .biodiesel-pid-svg svg {
        /* Natural 1343×805 viewBox; let SVG scale to fit its container
           while preserving aspect ratio (no clipping, no stretching). */
        display: block;

        width: auto;
        height: auto;
        max-width: 100%;
        max-height: 100%;

        margin: 0 auto !important;
        padding: 0 !important;

        background-color: transparent !important;

        /* Inline preserveAspectRatio ensures the SVG uniformly scales
           inside its container. Matches the V1.1 reference behavior. */
        preserveAspectRatio: xMidYMid meet;
    }
}

    }

    .monitor-page-title {
        color: #ffffff;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0.02em;
    }

    .monitor-page-subtitle {
        color: #ffff00;
        font-size: 12px;
        letter-spacing: 0.02em;
    }

    .monitor-metric-grid {
        width: 100%;
        display: grid !important;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px !important;
    }

    .monitor-metric-card {
        min-height: 84px;
        border-radius: 12px;
        border: 1px solid #ffffff;
        background: #000000;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
        padding: 10px 12px;
    }

    .monitor-metric-title {
        color: #ffffff;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
    }

    .monitor-metric-value {
        color: #00ff00;
        font-size: 24px;
        line-height: 1.05;
        margin-top: 8px;
        font-weight: 650;
    }

    .monitor-metric-unit {
        color: #ffff00;
        font-size: 11px;
        margin-top: 4px;
    }

    .monitor-main-layout {
        width: 100%;
        display: grid !important;
        grid-template-columns: 280px minmax(0, 1fr);
        gap: 12px !important;
        min-height: 560px;
    }

    .monitor-plot-list {
        width: 100%;
        border-radius: 12px;
        border: 1px solid #ffffff;
        background: #000000;
        padding: 10px;
        gap: 8px !important;
    }

    .monitor-selector-title {
        color: #ffffff;
        font-size: 11px;
        letter-spacing: 0.08em;
        padding: 6px 4px;
    }

    .monitor-plot-button {
        width: 100%;
        justify-content: flex-start;
        text-align: left;
        border-radius: 8px;
        padding: 8px 10px !important;
        min-height: 38px;
    }

    .monitor-plot-button-inactive {
        color: #ffffff;
        border: 1px solid #ffffff;
        background: #000000;
    }

    .monitor-plot-button-active {
        color: #000000;
        border: 1px solid #ffff00;
        background: #ffff00;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
    }

    .monitor-stage {
        width: 100%;
        min-height: 560px;
        border-radius: 12px;
        border: 1px solid #ffffff;
        background: #000000;
        padding: 10px;
        gap: 8px !important;
    }

    .monitor-active-header {
        width: 100%;
        justify-content: space-between;
        align-items: baseline;
        gap: 8px !important;
        flex-wrap: wrap;
    }

    .monitor-active-title {
        color: #ffffff;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.03em;
    }

    .monitor-active-subtitle {
        color: #ffff00;
        font-size: 11px;
    }

    .monitor-chart-single {
        width: 100%;
        height: 460px;
        border-radius: 12px;
        border: 1px solid #ffffff;
        background: #000000;
        overflow: hidden;
    }

    .monitor-bottom-info {
        width: 100%;
        gap: 16px !important;
        color: #ffffff;
        font-size: 11px;
    }

    @media (max-width: 1280px) {
        .monitor-metric-grid {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .monitor-main-layout {
            grid-template-columns: 240px minmax(0, 1fr);
        }
    }

    @media (max-width: 900px) {
        .monitor-metric-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .monitor-main-layout {
            grid-template-columns: 1fr;
            min-height: 0;
        }

        .monitor-stage {
            min-height: 0;
        }

        .monitor-chart-single {
            height: 360px;
        }
    }

    @media (max-width: 640px) {
        .monitor-root {
            padding: 14px 12px 18px 12px !important;
        }

        .monitor-metric-grid {
            grid-template-columns: 1fr;
        }

        .monitor-chart-single {
            height: 300px;
        }
    }
}

/* ===== control_panel.css ===== */
/* ui_root/static/css/control_panel.css */

/* ============================================================
   CONTROL PANEL CSS ENTRY

   Split into:
   - base.css              : page root, main area, stack
   - sections.css          : default control panel sections
   - pid_layout.css        : PID root, navbar row, canvas row
   - pid_svg.css           : SVG wrapper sizing
   - pid_animation.css     : SVG animation play state
   - controller_modal.css  : TIC-100 modal styling
   - pid_right_drawer.css  : navbar toggle + right drawer overlay
   - responsive.css        : responsive rules
   ============================================================ */



/* ===== drawer.css ===== */
/* ui_root/static/css/drawer.css */

/* ============================================================
   CONTROL PANEL DRAWER STYLES

   Current drawer design:
   - text-only menu
   - no icon
   - left aligned labels
   - MENU title has no red background
   - red separator is directly below MENU title, with no gap
   - distance after red separator is controlled by .drawer-menu-list padding-top
   - active item uses yellow background and black text
   - one responsive breakpoint only
   ============================================================ */

@layer pages {

    /* =========================================================
       LEFT DRAWER / LEFT BAR
       ========================================================= */

    .control-left-drawer,
    .left-bar {
        width: var(--control-left-drawer-w, 240px) !important;

        padding: 0 !important;

        background-color: var(--bg-header) !important;
        border-right: 1px solid var(--border-color) !important;

        color: var(--text-main);
        font-family: var(--font-ui);

        overflow: hidden !important;
    }

    aside.control-left-drawer,
    aside.left-bar {
        width: var(--control-left-drawer-w, 240px) !important;
    }

    .control-left-drawer .q-drawer__content,
    .left-bar .q-drawer__content {
        height: 100% !important;

        display: flex !important;
        flex-direction: column;

        background-color: var(--bg-header) !important;

        overflow-x: hidden !important;
        overflow-y: auto !important;
    }


    /* =========================================================
       LEFT DRAWER CONTENT
       ========================================================= */

    .control-left-drawer-content {
        width: 100%;
        height: 100%;

        display: flex !important;
        flex-direction: column;

        /*
           Important:
           ui.column can introduce layout gap.
           Keep this 0 so MENU title and red separator touch directly.
        */
        gap: 0 !important;

        margin: 0 !important;
        padding: 0 !important;

        background-color: var(--bg-header);
        color: var(--text-main);

        overflow-x: hidden;
        overflow-y: auto;
    }

    .control-left-drawer-content > * {
        margin-top: 0 !important;
        margin-bottom: 0 !important;
    }


    /* =========================================================
       MENU TITLE
       ========================================================= */

    .drawer-menu-title,
    .menu-title {
        width: 100%;

        height: var(--drawer-menu-title-h, 50px);
        min-height: var(--drawer-menu-title-h, 50px);

        display: flex;
        align-items: center;
        justify-content: flex-start;
        flex: 0 0 auto;

        margin: 0 !important;
        padding: 0 1rem;

        background-color: transparent !important;
        border: none !important;

        color: var(--text-white);

        font-family: var(--font-display);
        font-size: 0.85rem;
        font-weight: 700;
        line-height: 1;

        letter-spacing: 0.04em;
        text-transform: uppercase;

        text-align: left;
        user-select: none;
    }


    /* =========================================================
       MENU RED SEPARATOR
       Directly below MENU title.
       ========================================================= */

    .drawer-menu-red-separator,
    .drawer-menu-red-separator.q-separator {
        width: 100%;

        height: var(--drawer-menu-item-h, 40px);
        min-height: var(--drawer-menu-item-h, 40px);

        display: block !important;
        flex: 0 0 auto;

        margin: 0 !important;
        padding: 0 !important;

        background-color: #d32f2f !important;
        border: none !important;

        opacity: 1 !important;
    }


    /* =========================================================
       MENU LIST
       ========================================================= */

    .drawer-menu-list {
        width: 100%;

        display: flex !important;
        flex-direction: column;

        /*
           Controls distance between menu items.
        */
        gap: 0.5rem !important;

        margin: 0 !important;

        /*
           padding-top controls distance between red separator and first item.
           If you want the first item closer to the red separator, reduce 1rem.
        */
        padding: 1rem 0.35rem 0.45rem 0.35rem !important;
    }


    /* =========================================================
       MENU ITEM BASE
       ========================================================= */

    .drawer-menu-item,
    .menu-item {
        width: 100%;

        height: var(--drawer-menu-item-h, 40px);
        min-height: var(--drawer-menu-item-h, 40px);

        display: flex !important;
        align-items: center;
        justify-content: flex-start;

        margin: 0 !important;
        padding: 0.5rem 0.65rem !important;

        background-color: transparent !important;
        border: none !important;
        border-radius: 6px;

        color: #c9d1d9 !important;

        font-family: var(--font-ui) !important;
        font-size: 0.78rem !important;
        font-weight: 500 !important;
        line-height: 1.25;

        text-align: left !important;

        cursor: pointer;
        user-select: none;

        box-shadow: none !important;

        transition:
            background-color 0.15s ease,
            color 0.15s ease;
    }

    /*
       Quasar button puts text inside .q-btn__content.
       This keeps the label left-aligned.
    */
    .drawer-menu-item .q-btn__content,
    .menu-item .q-btn__content {
        width: 100%;

        display: flex !important;
        align-items: center;
        justify-content: flex-start !important;

        color: inherit !important;

        text-align: left !important;
        line-height: 1.25;
        white-space: normal;
    }

    .drawer-menu-item::before,
    .menu-item::before {
        box-shadow: none !important;
    }

    .drawer-menu-item:hover,
    .menu-item:hover {
        background-color: rgba(255, 255, 255, 0.06) !important;
        color: var(--text-white) !important;
    }

    .drawer-menu-item:active,
    .menu-item:active {
        background-color: rgba(255, 255, 255, 0.09) !important;
    }


    /* =========================================================
       ACTIVE MENU ITEM
       ========================================================= */

    .drawer-menu-item-active,
    .menu-item-active {
        background-color: var(--text-highlight) !important;
        color: #000000 !important;

        font-weight: 700 !important;
    }

    .drawer-menu-item-active:hover,
    .menu-item-active:hover,
    .drawer-menu-item-active:active,
    .menu-item-active:active {
        background-color: var(--text-highlight) !important;
        color: #000000 !important;
    }

    .drawer-menu-item-active .q-btn__content,
    .menu-item-active .q-btn__content {
        color: #000000 !important;
        font-weight: 700 !important;
    }


    /* =========================================================
       RIGHT DRAWER — CONTROLLER PARAMETER PANEL
       Reserved for next stage.
       ========================================================= */

    .right-drawer {
        padding: 0 !important;

        background-color: #000000 !important;
        border-left: 1px solid var(--border-color) !important;

        color: var(--text-main);
        font-family: var(--font-ui);
    }

    .right-drawer .q-drawer__content {
        height: 100% !important;

        display: flex;
        flex-direction: column;

        overflow-x: hidden !important;
        overflow-y: auto !important;
    }


    /* =========================================================
       RIGHT DRAWER HEADER
       ========================================================= */

    .drawer-header {
        width: 100%;
        height: 33px;

        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;

        padding: 0.6rem 0.75rem;

        background-color: #000000;
        border-bottom: 1px solid var(--border-color);
    }

    .drawer-header-title {
        width: 100%;

        color: var(--text-white);

        font-family: var(--font-display);
        font-size: 0.5rem;
        font-weight: 700;

        letter-spacing: 0.06em;
        text-transform: uppercase;
    }


    /* =========================================================
       RIGHT DRAWER SECTION TITLE
       ========================================================= */

    .drawer-section-title {
        padding: 0.75rem 0.75rem 0.25rem;

        color: var(--text-success);

        font-family: var(--font-mono);
        font-size: 0.7rem;
        font-weight: 700;

        letter-spacing: 1px;
        text-transform: uppercase;
    }


    /* =========================================================
       RIGHT DRAWER PARAMETER ROW
       ========================================================= */

    .drawer-param-row {
        display: flex;
        flex-direction: column;

        gap: 0.2rem;

        padding: 0.3rem 0.75rem;
    }

    .drawer-param-label {
        color: var(--text-muted);

        font-family: var(--font-mono);
        font-size: 0.65rem;

        letter-spacing: 0.5px;
        text-transform: uppercase;
    }


    /* =========================================================
       RIGHT DRAWER INPUT
       ========================================================= */

    .drawer-input .q-field__control {
        min-height: 34px !important;
        height: 34px !important;

        background: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid var(--border-color) !important;
        border-radius: 4px !important;
    }

    .drawer-input .q-field__native,
    .drawer-input .q-field__input {
        padding: 0 8px !important;

        color: var(--text-main) !important;

        font-family: var(--font-mono) !important;
        font-size: 0.8rem !important;
    }


    /* =========================================================
       RIGHT DRAWER LIVE VALUE CARD
       ========================================================= */

    .drawer-live-card {
        margin: 0.4rem 0.75rem;
        padding: 0.5rem 0.75rem;

        background: rgba(76, 175, 80, 0.06);
        border: 1px solid rgba(76, 175, 80, 0.2);
        border-radius: 6px;

        text-align: center;
    }

    .drawer-live-value {
        color: var(--text-success);

        font-family: var(--font-mono);
        font-size: 1.1rem;
        font-weight: 700;
        line-height: 1.4;
    }

    .drawer-live-sublabel {
        margin-top: 2px;

        color: var(--text-muted);

        font-family: var(--font-mono);
        font-size: 0.6rem;

        letter-spacing: 1px;
        text-transform: uppercase;
    }


    /* =========================================================
       RIGHT DRAWER NOTE
       ========================================================= */

    .drawer-readonly-note {
        padding: 1.5rem 0.75rem;

        color: var(--text-muted);

        font-family: var(--font-mono);
        font-size: 0.7rem;
        font-style: italic;
        line-height: 1.5;

        text-align: center;
    }


    /* =========================================================
       RIGHT DRAWER APPLY BUTTON
       ========================================================= */

    .drawer-apply-btn {
        height: 36px !important;

        margin: 0.75rem 0.75rem !important;

        font-family: var(--font-mono) !important;
        font-size: 0.75rem !important;
        font-weight: 700 !important;

        letter-spacing: 0.5px;
    }


    /* =========================================================
       RESPONSIVE
       One breakpoint only.
       ========================================================= */

    @media (max-width: 50rem) {
        .control-left-drawer,
        .left-bar,
        aside.control-left-drawer,
        aside.left-bar {
            width: var(--control-left-drawer-w-sm, 160px) !important;
        }

        .drawer-menu-title,
        .menu-title {
            height: var(--drawer-menu-title-h-sm, 64px);
            min-height: var(--drawer-menu-title-h-sm, 64px);

            padding: 0 0.75rem;

            font-size: 0.75rem;
        }

        .drawer-menu-red-separator,
        .drawer-menu-red-separator.q-separator {
            height: var(--drawer-menu-item-h-sm, 36px);
            min-height: var(--drawer-menu-item-h-sm, 36px);
        }

        .drawer-menu-list {
            gap: 0.3rem !important;
            padding: 0.75rem 0.3rem 0.4rem 0.3rem !important;
        }

        .drawer-menu-item,
        .menu-item {
            height: var(--drawer-menu-item-h-sm, 36px);
            min-height: var(--drawer-menu-item-h-sm, 36px);

            padding: 0.4rem 0.55rem !important;

            border-radius: 5px;

            font-size: 0.7rem !important;
            line-height: 1.2;
        }

        .drawer-menu-item .q-btn__content,
        .menu-item .q-btn__content {
            line-height: 1.2;
        }
    }
}

/* ===== footer.css ===== */
/* ui_root/static/css/footer.css */

/* ============================================================
   APPLICATION FOOTER STYLES

   Structure:
   .app-footer
   └── .app-footer-inner
       └── .footer-region.footer-left
           └── .footer-text
   ============================================================ */

@layer components {

    /* =========================================================
       FOOTER ROOT
       ========================================================= */

    .app-footer {
        height: var(--footer-h);
        min-height: var(--footer-h);

        padding-left: var(--footer-px);
        padding-right: var(--footer-px);

        background-color: var(--bg-footer) !important;
        color: var(--text-main);

        font-family: var(--font-ui);

        border-top: 1px solid var(--border-color);

        overflow: hidden;
    }


    /* =========================================================
       FOOTER INNER
       ========================================================= */

    .app-footer-inner {
        width: 100%;
        height: 100%;

        gap: 0;
    }


    /* =========================================================
       FOOTER REGION
       ========================================================= */

    .footer-region {
        height: 100%;
        min-width: 0;
    }

    .footer-left {
        flex: 1 1 auto;
    }


    /* =========================================================
       FOOTER TEXT
       ========================================================= */

    .footer-text {
        font-family: var(--font-ui);
        font-size: var(--footer-fs);
        font-weight: 400;

        color: var(--text-muted);

        line-height: 1;
        letter-spacing: 0.02em;

        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }


    /* =========================================================
       RESPONSIVE
       ========================================================= */

    @media (max-width: 50rem) {
        .app-footer {
            padding-left: var(--footer-px);
            padding-right: var(--footer-px);
        }

        .footer-text {
            font-size: var(--footer-fs);
        }
    }
}

/* ===== header.css ===== */
/* ui_root/static/css/header.css */

@layer components {
    /* =========================================================
       HEADER ROOT
       ========================================================= */

    .app-header {
        height: var(--header-h);
        min-height: var(--header-h);
        background-color: var(--bg-header);
        color: var(--text-main);
        font-family: var(--font-ui);

        padding-left: var(--header-px);
        padding-right: var(--header-px);
    }

    .app-header-inner {
        width: 100%;
        height: 100%;
        gap: var(--header-gap);
    }


    /* =========================================================
       HEADER REGIONS
       ========================================================= */

    .header-region {
        height: 100%;
        min-width: 0;
    }

    .header-left {
        flex: 1 1 0;
        gap: var(--header-gap);
    }

    .header-center {
        flex: 0 1 auto;
        min-width: 0;
    }

    .header-right {
        flex: 1 1 0;
        gap: var(--header-gap);
    }


    /* =========================================================
       MENU BUTTON
       ========================================================= */

    .header-menu-button {
        color: var(--text-white) !important;
        flex: 0 0 auto;
    }


    /* =========================================================
       APP TITLE
       ========================================================= */

    .app-title {
        font-family: var(--font-display);
        font-size: var(--app-title-fs);
        font-weight: 600;
        letter-spacing: 0.02rem;
        color: var(--text-white);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    /* Clickable app title (set by
       :func:`app.components.header.render_header_title` when
       the page passes an ``on_click`` handler). Mirrors the
       look-and-feel of the home page's case-card link so the
       title reads as an obviously interactive element without
       needing to switch to ``<a>`` (which would fight the
       existing ``.app-title`` typography). The hover
       opacity hint follows the same convention the case
       cards use for their image-link cluster. */
    .app-title-clickable {
        cursor: pointer;
        user-select: none;
    }

    .app-title-clickable:hover {
        opacity: 0.85;
    }

    /* Keyboard focus ring. Only drawn on keyboard focus
       (``:focus-visible``) so a mouse click does not leave
       a permanent outline around the title. */
    .app-title-clickable:focus-visible {
        outline: 2px solid currentColor;
        outline-offset: 2px;
        border-radius: 2px;
    }


    /* =========================================================
       ORGANIZATION IDENTITY
       ========================================================= */

    .org-block {
        font-family: var(--font-ui);
        line-height: 1.15;
        white-space: nowrap;
        min-width: var(--org-block-min-w);
    }

    .org-block-right {
        align-items: flex-end;
        text-align: right;
    }

    .org-block-center {
        align-items: center;
        text-align: center;
    }

    .org-line-1,
    .org-line-2,
    .org-line-3 {
        width: 100%;
    }

    .org-block-right .org-line-1,
    .org-block-right .org-line-2,
    .org-block-right .org-line-3 {
        text-align: right;
    }

    .org-block-center .org-line-1,
    .org-block-center .org-line-2,
    .org-block-center .org-line-3 {
        text-align: center;
    }

    .org-line-1 {
        font-size: var(--org-line-1-fs);
        font-weight: 600;
        letter-spacing: 0.15px;
        color: var(--text-main);
    }

    .org-line-2 {
        font-size: var(--org-line-2-fs);
        font-weight: 400;
        letter-spacing: 0.1px;
        color: var(--text-muted);
    }

    .org-line-3 {
        font-size: var(--org-line-3-fs);
        font-weight: 400;
        letter-spacing: 0.08px;
        color: var(--text-soft);
    }


    /* =========================================================
       LOGOS
       ========================================================= */

    .header-logo-row,
    .org-logo-row {
        height: 100%;
        flex: 0 0 auto;
    }

    .header-logo-image {
        display: block;
        flex: 0 0 auto;

        width: var(--header-logo-w);
        max-width: var(--header-logo-w);
        max-height: var(--header-logo-max-h);

        object-fit: contain;
        overflow: visible;
    }

    .org-logo-image {
        display: block;
        flex: 0 0 auto;

        width: var(--org-logo-w);
        height: var(--org-logo-h);

        max-width: var(--org-logo-w);
        max-height: var(--org-logo-max-h);

        object-fit: contain;
        overflow: visible;
    }


    /* =========================================================
       HOME HEADER VARIANT
       ========================================================= */

    .home-header .header-center {
        display: none;
    }

    .home-header .header-left {
        flex: 1 1 auto;
    }

    .home-header .header-right {
        flex: 0 0 auto;
    }


    /* =========================================================
       CONTROL PANEL HEADER VARIANT
       ========================================================= */

    .control-panel-header .header-left {
        flex: 1 1 0;
    }

    .control-panel-header .header-center {
        flex: 0 1 auto;
    }

    .control-panel-header .header-right {
        flex: 1 1 0;
    }


    /* =========================================================
       RESPONSIVE HEADER
       ========================================================= */

    @media (max-width: 640px) {
        .org-block {
            min-width: 230px;
        }

        .header-logo-image {

/* ===== home.css ===== */
/* ui_root/static/css/home.css */

/* ============================================================
   HOME PAGE STYLES

   Struktur yang didukung:

   body.home-page
   └── .home-main
       └── .home-scroll-region
           └── .home-content-layer
               └── .home-content-root
                   ├── .intro-section
                   │   └── .intro-section-inner
                   │       ├── .intro-logo
                   │       ├── .intro-text-block
                   │       └── .developer-area
                   ├── .simulation-section
                   │   └── .simulation-section-inner
                   │       └── .simulation-expansion
                   │           └── .simulation-wrapper-card
                   │               └── .simulation-card-grid

   ============================================================ */


/* ============================================================
   COMMON CONTENT COMPONENTS
   ============================================================ */

@layer components {
    .section-title {
        margin-bottom: 0.5rem;

        font-family: var(--font-display);
        font-size: var(--section-title-fs);
        font-weight: 600;
        letter-spacing: 0.02em;

        color: var(--text-main);
    }

    .app-card {
        width: 100%;
        padding: 1rem;

        background-color: var(--bg-panel);
        border: 1px solid var(--border-color);
        border-radius: 8px;

        box-shadow: none;
        overflow: visible;
    }

    .clickable-card {
        cursor: pointer;
    }
}


/* ============================================================
   HOME PAGE
   ============================================================ */

@layer pages {

    /* ========================================================
       ROOT BACKGROUND
       ======================================================== */

    body.home-page,
    body.home-page #app,
    body.home-page .nicegui-content,
    body.home-page .q-layout,
    body.home-page .q-page-container,
    body.home-page .q-page {
        width: 100% !important;
        max-width: none !important;

        margin: 0 !important;
        padding: 0 !important;

        background:
            radial-gradient(
                circle at top center,
                rgba(0, 180, 160, 0.12) 0%,
                rgba(0, 100, 130, 0.07) 28%,
                transparent 58%
            ),
            linear-gradient(
                180deg,
                var(--bg-main) 0%,
                #071015 100%
            ) !important;

        background-repeat: no-repeat !important;
        background-size: cover !important;
        background-position: center top !important;
        background-attachment: fixed !important;
    }

    /* Extend the same gradient onto the fixed .home-main region so
       the area between header and footer (where content actually
       renders) shows the background instead of a flat --bg-main. */
    body.home-page .home-main {
        background:
            radial-gradient(
                circle at top center,
                rgba(0, 180, 160, 0.12) 0%,
                rgba(0, 100, 130, 0.07) 28%,
                transparent 58%
            ),
            linear-gradient(
                180deg,
                var(--bg-main) 0%,
                #071015 100%
            ) !important;

        background-repeat: no-repeat !important;
        background-size: cover !important;
        background-position: center top !important;
        background-attachment: fixed !important;
    }


    /* ========================================================
       HOME MAIN AREA
       Fixed area between header and footer.
       ======================================================== */

    .home-main {
        position: fixed;

        top: var(--header-h);
        right: 0;
        bottom: var(--footer-h);
        left: 0;

        width: 100% !important;
        max-width: none !important;
        min-width: var(--min-viewport-width);

        height: auto;
        min-height: auto;

        margin: 0 !important;
        padding: 0 !important;

        background: transparent !important;

        overflow: hidden;
    }

    .home-main::before,
    .home-main::after {
        content: "";
        position: fixed;
        inset: 0;

        pointer-events: none;
        z-index: 0;
    }

    /* Decorative grid pattern. Two stacked linear-gradients create a
       1px teal-tinted grid: vertical lines at every 40px, horizontal
       lines at every 40px. Alpha is intentionally very low (0.04) so
       the grid reads as a soft engineering blueprint rather than a
       dominant texture. `background-attachment: fixed` keeps the grid
       anchored to the viewport while content scrolls past. */
    .home-main::before {
        background-image:
            linear-gradient(
                to right,
                rgba(0, 180, 160, 0.028) 1px,
                transparent 1px
            ),
            linear-gradient(
                to bottom,
                rgba(0, 180, 160, 0.028) 1px,
                transparent 1px
            );
        background-size:
            40px 40px,
            40px 40px;
        background-repeat: repeat, repeat;
        background-position: 0 0, 0 0;
        background-attachment: fixed;

        /* Soft radial mask so the grid fades out near the edges of the
           viewport. Keeps it from looking like graph paper when the
           window is wide. */
        -webkit-mask-image:
            radial-gradient(
                ellipse at center,
                rgba(0, 0, 0, 1) 0%,
                rgba(0, 0, 0, 0.85) 55%,
                rgba(0, 0, 0, 0) 90%
            );
                mask-image:
            radial-gradient(
                ellipse at center,
                rgba(0, 0, 0, 1) 0%,
                rgba(0, 0, 0, 0.85) 55%,
                rgba(0, 0, 0, 0) 90%
            );
    }

    .home-main::after {
        background: none;
    }


    /* ========================================================
       HOME SCROLL REGION
       ======================================================== */

    .home-scroll-region {
        position: relative;

        width: 100%;
        height: 100%;

        overflow-x: hidden;
        overflow-y: auto;

        scrollbar-gutter: stable both-edges;

        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;

    .home-content-layer {

        padding:
            clamp(1rem, 2vw, 2rem)

    .home-content-root {

    /* ========================================================

        align-items: center;

        padding: 0.55rem 1rem;

        background-color: transparent !important;

        font-size: clamp(0.95rem, 1.35vw, 1.25rem);

    .simulation-expansion .q-expansion-item__toggle-icon,

    }

    .simulation-expansion .q-expansion-item__content {
        max-height: min(52vh, 520px);

        padding: 0;

        overflow-x: hidden;
        overflow-y: auto;

        overscroll-behavior: contain;

        border-top: 1px solid rgba(255, 255, 255, 0.05);

    @keyframes simulation-expand-fade {

            transform: translateY(-4px);

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .simulation-wrapper-card {
        width: 100%;

        padding: clamp(0.75rem, 1.5vw, 1.25rem);

        border: 1px solid var(--border-color);
        border-radius: 8px;

        box-shadow: none !important;

        transition:
            border-color 0.15s ease,
            background-color 0.15s ease,
            transform 0.15s ease;
    }

    .simulation-case-card:hover {
        border-color: var(--text-highlight);
        background-color: var(--bg-panel-hover) !important;

        transform: translateY(-2px);
    }

    .simulation-case-content {
        width: 100%;

        display: flex !important;
        flex-direction: column;
        align-items: flex-start;

        text-align: left;
    }

    .case-title {
        font-family: var(--font-display);
        font-size: clamp(0.95rem, 1.35vw, 1.25rem);
        font-weight: 600;

        color: var(--text-white);
    }

    .case-description {
        margin-top: 0.75rem;

        font-size: clamp(0.7rem, 0.95vw, 0.9rem);
        line-height: 1.55;

        color: var(--text-main);
    }

    .case-tags {
        margin-top: 1rem;

        gap: 0.4rem;
        flex-wrap: wrap;
    }

    .case-tag {
        padding: 0.15rem 0.45rem;

        font-family: var(--font-mono);
        font-size: clamp(0.55rem, 0.75vw, 0.7rem);

        color: var(--text-muted);
        background-color: rgba(255, 255, 255, 0.03);

        border: 1px solid var(--border-color);
        border-radius: 999px;
    }

    /* ========================================================
       RESPONSIVE
       ======================================================== */

    @media (max-width: 800px) {
        .simulation-card-grid {
            grid-template-columns: 1fr;
        }
    }

    @media (max-width: 760px) {
        .developer-floating-card {
            width: min(420px, calc(100vw - 2rem));
        }

        .developer-row-layout {
            grid-template-columns: 1fr;
        }

        .developer-icon-row {
            gap: 0.65rem;
        }

        .github-resource-icon,
        .linkedin-resource-icon {
            width: clamp(82px, 24vw, 110px);
            min-width: 82px;
            max-width: 110px;

            height: clamp(18px, 5vw, 24px);
            min-height: 18px;
            max-height: 24px;
        }

        .docs-resource-icon {
            width: clamp(38px, 14vw, 64px);
            min-width: 38px;
            max-width: 64px;

            height: clamp(18px, 5vw, 24px);
            min-height: 18px;
            max-height: 24px;
        }
    }

    @media (max-width: 420px) {
        .developer-top-row {
            gap: 0.35rem;
        }

        .developer-icon-row {
            gap: 0.55rem;
        }

        .developer-team-title {
            max-width: 320px;
            font-size: 0.78rem;
        }

        .developer-hover-trigger {
            padding: 0.2rem 0.55rem;
        }
    }
}

/* ===== performance_monitor.css ===== */
/* ui_root/static/css/performance_monitor.css */

/* ============================================================
   PERFORMANCE MONITORING PAGE — DCS HMI style

   Visual language:

   - Panel chrome: matches the right-drawer / controller-modal
     industrial palette (--hmi-bg-panel / --hmi-border / amber
     accents). The header bar carries the amber accent stripe +
     a green status dot, just like the Simulation Manager page.

   - Picker UI: mirrors the Data Logger's
     .data-logger-header-cell — one clickable cell per available
     field, in a horizontal-scrolling row. Active cells get the
     green accent; inactive cells are muted. This is the same
     visual / interaction language as the Data Logger so the two
     pages read as a single "channel selection" surface.

   - Chart: deep-black well, amber axes, traces cycle through
     the DCS HMI palette (amber / cyan / green / red / sky / pink
     / orange / slate) — one color per selected field.

   Three stacked panels (input / state / output) — the picker
   is the *only* selection UI, just like the Data Logger; clicks
   here call bridge.set_selected_log_fields(...) so toggling a
   cell here is reflected instantly in the Data Logger and vice
   versa.
   ============================================================ */

@layer pages {

    /* When the performance-monitoring root lives inside a
       control-panel section, tint the section's own background
       so any tiny overflow / scroll-padding band reads as a
       continuation of the panel instead of a black strip. */
    .control-panel-section:has(> .pm-page) {
        background-color: var(--bg-panel-soft) !important;
    }

    /* =========================================================
       PAGE
       ========================================================= */

    .pm-page {
        width: 100%;
        min-height: 100%;
        flex: 1 1 auto;

        display: flex !important;
        flex-direction: column;

        gap: 14px !important;

        margin: 0 !important;
        padding: 18px 18px 24px 18px !important;

        /* Page background fills the section from header to footer,
           matching the data-logger strategy. */
        background-color: var(--bg-panel-soft, #151c29);

        color: var(--hmi-text-bright, #ffffff);

        font-family: var(--font-control-ui);
    }


    /* =========================================================
       PAGE HEADER
       ========================================================= */

    .pm-page-header {
        display: flex !important;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 8px;

        height: 33px;
        padding: 0 0.75rem;

        background:
            linear-gradient(180deg, rgba(255, 214, 0, 0.08), rgba(255, 214, 0, 0.0)),
            rgba(255, 255, 255, 0.025) !important;
        border-bottom: 1px solid var(--hmi-border, rgba(255, 255, 255, 0.14));
    }

    .pm-page-title {
        color: var(--text-highlight, #ffd600);

        font-family: var(--font-mono, "Courier Prime", monospace);
        font-size: 0.95rem;
        font-weight: 700;

        letter-spacing: 0.06em;
        line-height: 1;
    }

    .pm-page-subtitle {
        color: var(--text-muted, #bdbdbd);

        font-family: var(--font-control-ui);
        font-size: 0.62rem;
        font-weight: 600;

        letter-spacing: 0.04em;
        text-transform: uppercase;
        line-height: 1;
    }


    /* =========================================================
       PANEL — DCS HMI card (right-drawer / data-logger style)
       ========================================================= */

    .pm-panel {
        width: 100%;

        display: flex !important;
        flex-direction: column;

        gap: 0 !important;

        margin: 0 !important;
        padding: 0 !important;

        background-color: var(--bg-panel, #111722) !important;
        color: var(--hmi-text-bright, #ffffff);

        border: 1px solid var(--hmi-border, rgba(255, 255, 255, 0.14));
        border-radius: 6px;

        box-shadow:
            0 12px 28px rgba(0, 0, 0, 0.35),
            inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }


    /* =========================================================
       PANEL — header bar (title + hint + scope tag, with
       amber left accent stripe). Mirrors the data-logger
       .data-logger-scope-card-header.
       ========================================================= */

    .pm-panel-header {
        width: 100%;

        display: flex !important;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;

        gap: 8px;

        padding: 0.5rem 0.75rem 0.5rem 0.9rem;

        background:
            linear-gradient(180deg, rgba(255, 214, 0, 0.08), rgba(255, 214, 0, 0.0)),
            rgba(255, 255, 255, 0.025) !important;
        border-bottom: 1px solid var(--hmi-border, rgba(255, 255, 255, 0.14));

        position: relative;
    }

    .pm-panel-header::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 4px;
        background-color: var(--hmi-accent-amber, #ffd54f);
    }

    .pm-panel-title-group {
        display: flex !important;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.1rem !important;
        flex: 1 1 auto;
    }

    .pm-panel-title {
        color: var(--text-highlight, #ffd54f);

        font-family: var(--font-control-ui);
        font-size: 0.66rem;
        font-weight: 700;

        letter-spacing: 0.06em;
        text-transform: uppercase;
        line-height: 1;
    }

    .pm-panel-hint {
        color: var(--text-muted, #bdbdbd);

        font-family: var(--font-control-ui);
        font-size: 0.62rem;
        font-weight: 600;

        letter-spacing: 0.04em;
        text-transform: uppercase;
        line-height: 1;
    }

    .pm-panel-tag {
        display: inline-flex;
        align-items: center;
        gap: 5px;

        height: 20px;
        padding: 0 8px;

        color: var(--hmi-text-soft, #bdbdbd);
        background-color: transparent;
        border: 1px solid var(--hmi-border-strong, rgba(255, 255, 255, 0.20));
        border-radius: 2px;

        font-family: var(--font-control-ui);
        font-size: 0.6rem;
        font-weight: 700;

        letter-spacing: 0.06em;
        text-transform: uppercase;
    }

    .pm-panel-tag-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background-color: var(--text-highlight, #ffd54f);
        box-shadow: 0 0 4px var(--text-highlight, #ffd54f);
    }

    .pm-panel-tag-text {
        color: var(--hmi-text-soft, #bdbdbd);
        font-family: var(--font-control-ui);
        font-size: 0.6rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
    }


    /* =========================================================
       PANEL — body
       ========================================================= */

    .pm-panel-body {
        width: 100%;

        display: flex !important;
        flex-direction: column;

        gap: 10px !important;

        padding: 12px 14px 14px 14px !important;
    }


    /* =========================================================
       PANEL — header cell grid (picker UI)

       Mirrors .data-logger-header-grid: one cell per available
       field, horizontal-scrolling when there are many. Each cell
       is clickable, with active/inactive visual states.
       ========================================================= */

    .pm-panel-cell-container {
        width: 100%;
        margin: 0 !important;
        padding: 0 !important;
    }

    .pm-panel-cell-grid {
        width: 100%;

        display: flex !important;
        flex-wrap: nowrap;
        align-items: stretch;

        gap: 0.35rem !important;

        margin: 0 !important;
        padding: 0.4rem 0 !important;

        overflow-x: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--hmi-accent-amber, #ffd54f) #1a1a1a;
    }

    .pm-panel-cell-grid::-webkit-scrollbar {
        height: 6px;
    }

    .pm-panel-cell-grid::-webkit-scrollbar-track {
        background: #0a0a0a;
        border: 1px solid var(--hmi-border, rgba(255, 255, 255, 0.14));
        border-radius: 2px;
    }

    .pm-panel-cell-grid::-webkit-scrollbar-thumb {
        background: var(--hmi-accent-amber, #ffd54f);
        border-radius: 2px;
    }

    .pm-panel-cell-empty {
        flex: 1 1 100%;

        padding: 0.4rem 0.6rem;

        color: var(--text-muted);

        font-family: var(--font-control-ui);
        font-size: 0.72rem;
        font-style: italic;

        background-color: rgba(255, 255, 255, 0.02);

        border: 1px dashed rgba(255, 255, 255, 0.08);
        border-radius: 5px;
    }


    /* =========================================================
       PANEL — cell (one clickable signal column)
       Direct port of .data-logger-header-cell. The active
       accent uses the brand green so it matches the Data
       Logger exactly — same single source of truth = same
       active highlight.
       ========================================================= */

    .pm-cell {
        flex: 0 0 auto;
        min-width: 110px;
        max-width: 200px;

        display: flex !important;
        flex-direction: row;
        align-items: center;
        justify-content: flex-start;

        gap: 0.45rem;

        position: relative;

        padding: 0.4rem 0.6rem 0.4rem 0.7rem;

        font-family: var(--font-control-ui);

        background-color: rgba(255, 255, 255, 0.035);

        border: 1px solid rgba(255, 255, 255, 0.10);
        border-radius: 5px;

        user-select: none;
        cursor: pointer;

        transition:
            background-color 0.12s ease,
            border-color 0.12s ease,
            color 0.12s ease,
            box-shadow 0.12s ease;
    }

    .pm-cell:hover {
        background-color: rgba(255, 214, 0, 0.06);
        border-color: rgba(255, 214, 0, 0.35);
    }

    /* Color dot — appears on active cells. The fill is set via
       inline style (one palette color per index); this rule only
       shapes it. */
    .pm-cell-color-dot {
        flex: 0 0 auto;

        display: inline-block;

        width: 8px;
        height: 8px;
        border-radius: 50%;

        background-color: var(--hmi-accent-amber, #ffd54f);
        box-shadow: 0 0 4px currentColor;
    }

    /* Text column that holds the tag + meta. Lets the cell use
       flex-direction: row so the dot, tag, and meta line up
       horizontally like a real "channel tile". */
    .pm-cell-text {
        display: flex !important;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;

        gap: 0.05rem;

        min-width: 0;
        flex: 1 1 auto;
    }

    .pm-cell-tag {
        color: var(--text-main);

        font-family: var(--font-control-ui);
        font-size: 0.72rem;
        font-weight: 700;

        letter-spacing: 0.04em;
        text-transform: uppercase;

        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;

        max-width: 100%;
    }

    .pm-cell-meta {
        color: var(--text-muted);

        font-family: var(--font-control-ui);
        font-size: 0.6rem;
        font-weight: 500;

        letter-spacing: 0.04em;
        text-transform: uppercase;

        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;

        max-width: 100%;
    }

    /* Active state — the trace color (set inline on the element
       in Python) takes over: the cell's border, background tint,
       and glow all match the chart line color. The rules below
       are the fallback if no inline color is set; the inline
       !important styles from Python always win. */
    .pm-cell-active {
        background-color: rgba(255, 255, 255, 0.04);
        border-color: var(--text-highlight, #ffd54f);
    }

    .pm-cell-active .pm-cell-tag {
        color: var(--text-white);
    }

    .pm-cell-active .pm-cell-meta {
        color: var(--text-main);
    }

    .pm-cell-active:hover {
        background-color: rgba(255, 214, 0, 0.10);
        border-color: var(--text-highlight, #ffd54f);
    }

    /* Inactive state — column is hidden in the chart. */
    .pm-cell-inactive {
        color: var(--text-muted);
    }


    /* =========================================================
       PANEL — "selected" status strip
       ========================================================= */

    .pm-panel-statusbar {
        width: 100%;

        display: flex !important;
        align-items: center;
        justify-content: space-between;
        gap: 6px;

        margin: 0 !important;
        padding: 6px 10px !important;

        color: var(--hmi-text-soft, #bdbdbd);
        background-color: rgba(0, 0, 0, 0.30);
        border-top: 1px solid var(--hmi-border, rgba(255, 255, 255, 0.14));

        font-family: var(--font-control-ui);
        font-size: 0.62rem;
        font-weight: 400;
        letter-spacing: 0.04em;
        text-transform: uppercase;
    }

    .pm-panel-statusbar-label {
        color: var(--hmi-text-muted, #8b949e);
    }

    .pm-panel-statusbar-value {
        color: var(--text-highlight, #ffd54f);
        font-weight: 700;
        font-family: var(--font-control-ui);
        letter-spacing: 0.04em;
        word-break: break-all;
        text-align: right;
    }

    .pm-panel-statusbar-value-empty {
        color: var(--hmi-text-muted, #8b949e);
        font-style: italic;
        font-weight: 400;
    }


    /* =========================================================
       PANEL — chart (in a deep-black well, DCS retune)
       ========================================================= */

    .pm-panel-chart {
        width: 100%;
        height: 280px;
        min-height: 260px;

        background-color: #000000;
        border: 1px solid var(--hmi-border, rgba(255, 255, 255, 0.14));
        border-radius: 2px;
    }


    /* =========================================================
       RESPONSIVE
       ========================================================= */

    @media (max-width: 900px) {
        .pm-panel-chart {
            height: 230px;
            min-height: 210px;
        }
    }

    @media (max-width: 640px) {
        .pm-page {
            padding: 14px 12px 18px 12px !important;
        }

        .pm-panel-chart {
            height: 210px;
            min-height: 190px;
        }
    }
}


/* ===== pid_navbar.css ===== */
/* ui_root/static/css/pid_navbar.css */

/* ============================================================

    /* =========================================================
       SIMULATION MANAGER BLOCK

       Contains:
       - row 1: Simulation Manager button
       - row 2: Real Time checkbox

       Goal:

       - consistent icon/box size
       - consistent label size

    .pid-navbar-manager-block {

        display: flex !important;
        align-items: center;
        justify-content: flex-start;

        margin: 0 !important;

        font-family: var(--font-control-ui) !important;
        font-size: var(--pid-navbar-manager-label-fs, 0.7rem) !important;

    .pid-navbar-manager-symbol {

        height: var(--pid-navbar-manager-icon-size, 20px);

        white-space: nowrap;

    /* =========================================================

       - white checkbox
       - left aligned
       ========================================================= */

    .pid-navbar-realtime-check {

        display: flex !important;

    .pid-navbar-realtime-check .q-checkbox__inner {

        min-width: var(--pid-navbar-manager-icon-size, 20px) !important;

        height: var(--pid-navbar-manager-icon-size, 20px) !important;
        min-height: var(--pid-navbar-manager-icon-size, 20px) !important;

        font-size: var(--pid-navbar-manager-icon-size, 20px) !important;

    .pid-navbar-realtime-check .q-checkbox__inner--falsy .q-checkbox__bg {

    .pid-navbar-run-btn {

    }

    .pid-navbar-run-btn-active {

    }

    .pid-navbar-run-btn-active .q-icon {
        animation: pid-run-icon-pulse 1.4s ease-in-out infinite;
    }

    @keyframes pid-run-icon-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50%      { transform: scale(1.12); opacity: 0.85; }
    }

    /* ── Disabled state (simulation finished) ──
       Applied by ``set_run_button_disabled`` in
       app/pages/_svg_animation_helpers.py once the worker reaches
       ``time_end`` and ``state.natural_stop`` flips to True. The
       block is lifted on Reset and when the user extends End Time.

       We target both the attribute selector (``[disabled]`` — what
       Quasar / the HTML spec set) and the class
       (``pid-navbar-run-btn-disabled`` — what the helper applies as
       a visual hook independent of Quasar's own attribute juggling)
       so the styling is robust if either form is stripped by a
       Vue re-render. The active-state animation/glow is suppressed
       so a button that was Running and then naturally completed
       doesn't keep pulsing green. */
    .pid-navbar-run-btn[disabled],
    .pid-navbar-run-btn-disabled {
        color: rgba(255, 255, 255, 0.35) !important;
        opacity: 0.5 !important;
        cursor: not-allowed !important;
        pointer-events: auto !important;
        background-color: transparent !important;
        box-shadow: none !important;
    }

    .pid-navbar-run-btn[disabled] .q-icon,
    .pid-navbar-run-btn-disabled .q-icon {
        animation: none !important;
        opacity: 0.7 !important;
    }

    .pid-navbar-run-btn[disabled]:hover,
    .pid-navbar-run-btn-disabled:hover {
        background-color: transparent !important;
        box-shadow: none !important;
    }

    .pid-navbar-stop-btn {
        color: #ff5252 !important;
    }

    .pid-navbar-reset-btn {
        color: var(--text-highlight) !important;
    }


    /* =========================================================
       CLOCK
       ========================================================= */

    .pid-navbar-clock {
        min-width: var(--pid-navbar-clock-min-w, 190px);
        height: 100%;

        display: flex !important;
        flex-direction: column;
        align-items: flex-end;
        justify-content: center;

        gap: var(--pid-navbar-clock-gap, 0.08rem) !important;

        margin-top: 0 !important;
        margin-right: 0 !important;

    }

    .pid-navbar-clock-time {

        font-weight: 700;

        line-height: 1;
        letter-spacing: 0.03em;
    }


    /* =========================================================
       RESPONSIVE
       ========================================================= */

    @media (max-width: 50rem) {
        .pid-navbar-right {
            gap: 0.45rem;
            padding-right: 0.65rem;
        }

        .pid-navbar-process-label {
            font-size: 0.75rem;
        }

        .pid-navbar-manager-block {
            min-width: 128px;
        }

        .pid-navbar-manager-btn {
            height: 22px;
            min-height: 22px;

            padding: 0 0.3rem !important;

            font-size: 0.62rem !important;
        }

        .pid-navbar-manager-btn .q-btn__content {
            min-height: 22px;

            gap: 0.42rem !important;
        }

        .pid-navbar-manager-symbol {
            width: 16px;

        }

            height: 16px;

        }

        }

        .pid-navbar-realtime-check .q-checkbox__inner {

    /* =========================================================

        );

            0 18px 42px rgba(0, 0, 0, 0.55),

    /* =========================================================
       HEADER
       ========================================================= */

    .simulation-manager-page-header {
        width: 100%;

            linear-gradient(180deg, rgba(255, 214, 0, 0.08), rgba(255, 214, 0, 0.0)),

    /* =========================================================

       ========================================================= */

    .simulation-manager-page-form {

        display: flex !important;

    /* Input chrome — mirrors .tic-param-value / .faceplate-input-field

    .simulation-manager-page-input .q-field__append {

    }

    .simulation-manager-page-input .q-field__label,
    .simulation-manager-page-input .q-field__bottom {

    }


    /* =========================================================
       ACTIONS
       ========================================================= */

    .simulation-manager-page-actions {
        width: 100%;

        border-top: 1px solid rgba(255, 255, 255, 0.04);
    }

    .simulation-manager-page-apply-btn {
        color: var(--text-highlight) !important;
        font-weight: 700 !important;
    }


    /* =========================================================
       FLOATING DIALOG (mounted on the control-panel page)
       ---------------------------------------------------------
       The Runtime Manager card is also rendered as a draggable
       dialog that floats above the dashboard. The styles below
       override the centered-page card chrome so the card becomes
       a fixed-position panel, and make the header row behave as
       a drag handle (cursor + user-select).
       ========================================================= */

    body .floating-runtime-manager-card {
        /* Quasar-recommended positioning. The card is the
           direct child of ``.q-dialog__inner`` (Quasar's
           own div), which is itself ``position: fixed;
           inset: 0; display: flex; justify-content: center;
           align-items: center;`` — the
           ``positionClass: 'fixed-full flex-center'`` pattern
           from Quasar's ``QDialog.js``. The card has
           ``position: absolute`` (no other positioning), so
           the inner's flex layout centers it in the viewport
           automatically.

           The drag handler sets inline ``left``/``top`` on
           the card during a drag, which positions the card
           absolutely relative to the inner's ``position:
           fixed`` containing block (= the viewport). To
           re-center on the next open we just clear the
           inline ``left``/``top`` and the flex layout
           takes over again — no JS math, no race with
           Quasar's show-transition, no
           ``getBoundingClientRect`` measurement.

           ``--frm-drawer-offset`` (default 0) shifts the
           center to the content area when the drawer is
           open. */
        position: absolute !important;
        margin-left: var(--frm-drawer-offset, 0px) !important;

        /* User-resizable defaults — width / max-height are read from
           CSS custom-properties so the JS multi-edge resize handler
           in ``app/components/floating_runtime_manager.py`` can
           persist the user's drag of any resize handle to
           ``sessionStorage`` and replay it on the next open. The
           defaults below match the original fixed values so a fresh
           session looks identical to the pre-resize build. */
        width: var(--frm-width, min(720px, calc(100vw - 2rem))) !important;
        height: var(--frm-height, auto) !important;
        max-height: calc(100vh - 1rem) !important;

        /* Floors / ceilings for the user-drag. The min-* values
           keep the card large enough to remain usable even when
           the user drags the resize handle inward; the max-*
           values keep it inside the viewport. */
        min-width: 360px;
        min-height: 220px;
        max-width: calc(100vw - 1rem);

        /* NOTE: we deliberately do NOT use ``resize: both`` here.
           That CSS property only gives a single grip in the
           bottom-right corner and (because the grip is rendered as
           an overlay inside the element) it eats pointer events on
            any UI that happens to be near the corner — including
            our window buttons when the dialog is small. We mount
            our own 8-direction resize handles in JS instead (4
            edges + 4 corners) so the user can grab any side and
            the buttons stay click-through.

            ``overflow: visible`` is required so the absolutely-
            positioned resize handles (which sit 4 px outside the
            card bounding box on N/E/S/W edges) are not clipped.
            The inner ``.simulation-manager-page-form`` keeps its
            own ``overflow-y: auto`` so content scrollbars stay
            contained inside the rounded corners. */
        overflow: visible;

        z-index: 1000;

        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.55) !important;
    }

    /* The Quasar-recommended centering path. Quasar's
       ``.q-dialog__inner`` is already ``position: fixed;
       inset: 0; display: flex; justify-content: center;
       align-items: center;`` (see Quasar's QDialog.js
       positionClass ``fixed-full flex-center``). We rely
       on that flex centering to keep the card centered in
       the viewport. The card itself has no own
       positioning (only ``position: absolute``) so the
       flex layout centers it.

       On some Quasar versions the card itself receives
       the ``q-dialog__inner`` class. We keep the flex
       display + centering on the inner in both cases. */
    body .floating-runtime-manager-card.q-dialog__inner,
    .q-dialog__inner:has(> .floating-runtime-manager-card) {
        /* Keep the flex centering. */
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
        min-height: 0 !important;
        transform: none !important;
        padding: 0 !important;
    }

    body .floating-runtime-manager-card
        .simulation-manager-page-header {
        cursor: grab;
        touch-action: none;
    }

    body .floating-runtime-manager-card
        .simulation-manager-page-header:active {
        cursor: grabbing;
    }


    /* =========================================================
       DCS/HMI FACEPLATE STYLING
       ---------------------------------------------------------
       Re-skin the page body so the Runtime Manager reads like a
       real Distributed Control System (DCS) faceplate, while
       staying consistent with the rest of the ChemPlant app:

       - Header gets a tag-strip with the controller tag on the
         left and a colored mode-quality pill on the right.
       - Body becomes a grid of sections, each with a section
         header (uppercase, monospace, dim) and a horizontal
         "lane" of field groups underneath.
       - Fields become compact faceplate rows: small label on top,
         digital readout / input below, unit suffix at the right.
       - Status row across the bottom mirrors a DCS summary bar.

       Color/font choices map back to the rest of the app:
       - Title 15px Courier Prime (matches controller modal title)
       - Field body 0.7rem Courier Prime (matches tic-param-value)
       - Section title 0.66rem amber #ffd54f (matches tic-param-section-title)
       - Field-control bg #1b1b1b / border rgba(255,255,255,0.14)
         (matches tic-param-value .q-field__control)
       - Mode pill faceplate auto=#4caf50 / manual=#ffb300 / off=#9e9e9e
         (matches .faceplate-status-auto / -manual / -off)
       ========================================================= */

    /* Force the form to be a clean vertical stack of sections
       with no extra row gap (the section card supplies its own). */
    .simulation-manager-page-form {
        gap: 6px !important;
        padding: 4px 6px !important;
    }

    .simulation-manager-page-form > .row {
        /* Strip the row gap that the v1 page used to lay out the
           fields. The section card provides visual separation. */
        gap: 0 !important;
    }


    /* ── Section card — mirrors .faceplate-section (flat
       rgba(0,0,0,0.18) bg, hair border, 5px radius). */
    .sim-manager-section {
        width: 100%;

        display: flex !important;
        flex-direction: column;

        gap: 4px !important;

        margin: 0 !important;
        padding: 6px 8px !important;

        background-color: rgba(0, 0, 0, 0.18) !important;
        border: 1px solid rgba(255, 255, 255, 0.06) !important;
        border-radius: 5px !important;

        box-shadow: none !important;
    }

    .sim-manager-section + .sim-manager-section {
        margin-top: 0 !important;
    }

    .sim-manager-section-header {
        width: 100%;

        display: flex !important;
        align-items: center;
        justify-content: space-between;

        gap: 6px !important;

        margin: 0 0 2px 0 !important;
        padding: 0 !important;

        color: var(--text-highlight, #ffd54f);
        background-color: transparent;

        border-bottom: 1px solid var(--hmi-border);

        font-family: var(--font-control-ui);
        font-size: 0.66rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        line-height: 1;
        text-transform: uppercase;
        white-space: nowrap;
    }

    .sim-manager-section-title {
        color: var(--text-highlight, #ffd54f);
        background-color: transparent;

        font-family: var(--font-control-ui);
        font-size: 0.66rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
    }

    .sim-manager-section-hint {
        color: var(--text-muted, #bdbdbd);
        background-color: transparent;

        font-family: var(--font-control-ui);
        font-size: 0.62rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        opacity: 0.85;
    }

    .sim-manager-section-body {
        width: 100%;

        display: grid !important;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 8px !important;

        margin: 0 !important;
        padding: 2px 0 0 0 !important;
    }


    /* ── Action row (Continue / Stop) ──
       The action row is rendered by ``runtime_manager_page.py`` when
       the host supplies ``on_run``/``on_stop`` callbacks (i.e. the
       floating dialog mounted from the control-panel page). We
       override ``display: grid`` from the generic
       ``.sim-manager-section-body`` so the two buttons sit on one
       flexible row regardless of viewport width. */
    .sim-manager-actions-row {
        display: flex !important;
        flex-direction: row !important;
        flex-wrap: wrap;

        gap: 10px !important;

        align-items: stretch;
        justify-content: flex-start;

        grid-template-columns: none !important;
    }

    /* Compact DCS-style faceplate button. Color hooks mirror the
       PID navbar Run/Stop (green for run/continue, red for stop) so
       the dialog buttons read as the same affordance the navbar
       offers — operators don't have to learn two color systems. */
    .sim-manager-action-btn {
        min-width: 110px;

        height: 32px !important;
        min-height: 32px !important;

        padding: 0 14px !important;

        font-family: var(--font-control-ui) !important;
        font-size: 0.78rem !important;
        font-weight: 700 !important;
        letter-spacing: 0.06em !important;

        background-color: rgba(255, 255, 255, 0.04) !important;
        border: 1px solid rgba(255, 255, 255, 0.20) !important;
        border-radius: 4px !important;

        box-shadow: none !important;
    }

    .sim-manager-action-btn .q-icon {
        margin-right: 4px;
    }

    /* Continue / Run button — matches the controller modal
       action-button family: amber outline, transparent fill,
       amber hover wash. */
    .sim-manager-action-btn-run {
        color: var(--text-highlight, #ffd54f) !important;
    }
    .sim-manager-action-btn-run:hover {
        background-color: rgba(255, 214, 0, 0.14) !important;
        border-color: rgba(255, 214, 0, 0.90) !important;
    }

    .sim-manager-action-btn-stop {
        color: #ff5252 !important;
    }
    .sim-manager-action-btn-stop:hover {
        background-color: rgba(255, 82, 82, 0.10) !important;
        border-color: rgba(255, 82, 82, 0.55) !important;
    }

    /* Disabled state — used by the dialog action-row sync so the
       Continue button mirrors the navbar Run button's enabled /
       disabled state from ``set_run_button_disabled``. */
    .sim-manager-action-btn[disabled],
